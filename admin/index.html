<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitalVibe Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>* { font-family:'Prompt',sans-serif; } table{border-collapse:collapse;width:100%} td,th{border:1px solid #e5e7eb;padding:6px 10px;font-size:12px;text-align:left} th{background:#f9fafb;font-weight:700;}</style>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-6xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-black text-gray-900">🛠️ VitalVibe Admin Panel</h1>
      <p class="text-sm text-gray-500">ข้อมูลทั้งหมดในระบบ</p>
    </div>
    <div id="adminStatus" class="text-sm font-bold text-red-500">กำลังตรวจสอบสิทธิ์…</div>
  </div>

  <!-- Nav tabs -->
  <div class="flex flex-wrap gap-2 mb-6">
    <button onclick="showSection('dashboard')"  class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-blue-500 text-white">📊 Dashboard</button>
    <button onclick="showSection('users')"      class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">👥 Users</button>
    <button onclick="showSection('missions')"   class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">🏆 Missions</button>
    <button onclick="showSection('rewards')"    class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">🎁 Rewards</button>
    <button onclick="showSection('foodLogs')"   class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">🍱 Food Logs</button>
    <button onclick="showSection('healthRecording')" class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">📋 Health Recording</button>
    <button onclick="showSection('healthLogs')" class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">📊 Health Logs</button>
    <button onclick="showSection('reminders')"  class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">⏰ Reminders</button>
    <button onclick="showSection('redemptions')" class="admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600">🧾 Redemptions</button>
  </div>

  <!-- Sections -->
  <div id="sectionContent" class="bg-white border border-gray-200 rounded-xl p-4 overflow-x-auto min-h-64">
    <p class="text-gray-400 text-sm">เลือกหัวข้อด้านบน</p>
  </div>

  <!-- Modal for Add/Edit Reward -->
  <div id="rewardModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
      <h2 id="rewardModalTitle" class="font-black text-gray-800 mb-4">➕ เพิ่มของรางวัล</h2>
      <div class="space-y-3 mb-4">
        <div><label class="text-xs font-bold text-gray-500">ชื่อรางวัล</label>
          <input id="rTitle" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="Starbucks Gift Card"></div>
        <div><label class="text-xs font-bold text-gray-500">แต้มที่ต้องใช้</label>
          <input id="rPoints" type="number" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="500"></div>
        <div><label class="text-xs font-bold text-gray-500">emoji / ไอคอน</label>
          <input id="rImage" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="☕"></div>
        <div><label class="text-xs font-bold text-gray-500">คำอธิบาย</label>
          <input id="rDesc" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="คำอธิบายรางวัล"></div>
      </div>
      <div class="flex gap-2">
        <button id="rewardSaveBtn" onclick="saveReward()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold px-4 py-2 rounded-lg text-sm">บันทึก</button>
        <button onclick="closeRewardModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold px-4 py-2 rounded-lg text-sm">ยกเลิก</button>
      </div>
    </div>
  </div>

  <!-- Modal for Add/Edit Mission -->
  <div id="missionModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
      <h2 id="missionModalTitle" class="font-black text-gray-800 mb-4">➕ เพิ่มภารกิจ</h2>
      <div class="space-y-3 mb-4">
        <div><label class="text-xs font-bold text-gray-500">ชื่อภารกิจ</label>
          <input id="mTitle" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="บันทึกอาหาร 3 มื้อ"></div>
        <div><label class="text-xs font-bold text-gray-500">แต้มที่ได้รับ</label>
          <input id="mPoints" type="number" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="50"></div>
        <div><label class="text-xs font-bold text-gray-500">emoji</label>
          <input id="mIcon" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="🍱"></div>
        <div><label class="text-xs font-bold text-gray-500">คำอธิบาย</label>
          <input id="mDesc" class="w-full border rounded-lg px-3 py-2 text-sm mt-1" placeholder="บันทึกอาหารครบ 3 มื้อ"></div>
      </div>
      <div class="flex gap-2">
        <button id="missionSaveBtn" onclick="saveMission()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold px-4 py-2 rounded-lg text-sm">บันทึก</button>
        <button onclick="closeMissionModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold px-4 py-2 rounded-lg text-sm">ยกเลิก</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg font-bold shadow-lg z-40"></div>

</div><!-- /max-w -->

<script type="module">
  import { db, ADMIN_UIDS } from '../lib/firebase.js';
  import { getSession } from '../lib/auth.js';
  import {
    collection, getDocs, doc, deleteDoc, addDoc, updateDoc, query, where, getDoc
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  // ── FIX: HTML-escape ทุกค่าที่มาจากผู้ใช้ก่อนใส่ลงไปใน innerHTML ──
  // ป้องกัน Stored XSS: displayName / email / title / desc / image / icon ฯลฯ
  // ล้วนเป็นข้อมูลที่ผู้ใช้ทั่วไปกรอกเองได้ (เช่นตอนสมัครผ่านหน้า login)
  // ถ้าไม่ escape คนร้ายตั้งชื่อเป็น <img src=x onerror=...> แล้วรันสคริปต์ใน
  // หน้า admin panel ได้ทันที (อันตรายมากเพราะหน้านี้มีสิทธิ์ลบ/แก้ข้อมูลทั้งระบบ)
  const escapeHtml = (val) => {
    const str = val === null || val === undefined ? '–' : (typeof val === 'object' ? JSON.stringify(val) : String(val));
    return str.replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  };

  // Check admin status
  const session = getSession();
  const isAdmin = session?.uid && ADMIN_UIDS.includes(session.uid);

  // Store admin status in sessionStorage for other pages
  if (session?.uid) {
    sessionStorage.setItem('vv_isAdmin', isAdmin);
    console.log(`%c🔐 User: ${session.uid.substring(0,8)}... | Admin: ${isAdmin}`,
      isAdmin ? 'color:green;font-weight:bold' : 'color:orange;font-weight:bold');
  }

  document.getElementById('adminStatus').textContent = isAdmin ? '✅ Admin' : '❌ ไม่มีสิทธิ์';
  document.getElementById('adminStatus').className   = isAdmin
    ? 'text-sm font-bold text-green-600'
    : 'text-sm font-bold text-red-500';

  // ── FIX: ไม่เปิดเผยรายชื่อ ADMIN_UIDS ให้คนที่ไม่ใช่ admin เห็น ──
  // เดิมหน้านี้ print ทั้ง array ของ admin UID ออกมาตรงๆ ทำให้ผู้ใช้ทั่วไป
  // (ที่ login แล้วแต่ไม่ใช่ admin) รู้ว่า UID ไหนเป็น admin บ้าง ซึ่งเป็น
  // ข้อมูลอ่อนไหวที่ไม่ควรหลุดออกไปฝั่ง client โดยไม่จำเป็น
  if (!isAdmin && session?.uid) {
    document.getElementById('sectionContent').innerHTML = `
      <div class="bg-red-50 border border-red-200 rounded-lg p-6">
        <p class="text-red-600 font-bold text-lg mb-2">❌ ไม่มีสิทธิ์เข้าถึง Admin Panel</p>
        <p class="text-red-500 text-sm mb-3">UID ของคุณ: <code class="bg-red-100 px-2 py-1 rounded">${escapeHtml(session.uid)}</code></p>
        <p class="text-red-500 text-xs">หากคุณควรเป็น admin โปรดติดต่อผู้ดูแลระบบ</p>
      </div>
    `;
  } else if (!session?.uid) {
    document.getElementById('sectionContent').innerHTML = `
      <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
        <p class="text-yellow-600 font-bold text-lg">⚠️ ยังไม่ได้เข้าสู่ระบบ</p>
        <p class="text-yellow-500 text-sm mt-2">กรุณา <a href="/login.html?redirect=/admin/index.html" class="underline font-bold">เข้าสู่ระบบ</a> ก่อน</p>
      </div>
    `;
  }

  let currentSection = '';
  let editingRewardId = null;
  let editingMissionId = null;

  // Toast notification
  const showToast = (msg, type = 'success') => {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg font-bold shadow-lg z-40 ${
      type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
    }`;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
  };

  // Dashboard section
  const loadDashboard = async () => {
    const el = document.getElementById('sectionContent');
    el.innerHTML = '<p class="text-gray-400 text-sm animate-pulse">กำลังโหลด…</p>';

    try {
      const missions = await getDocs(collection(db, 'missions'));
      const rewards = await getDocs(collection(db, 'rewards'));
      const users = await getDocs(collection(db, 'users'));
      const redemptions = await getDocs(collection(db, 'redemptions'));

      const today = new Date().toDateString();
      const missionsToday = missions.docs.filter(d => new Date(d.data().createdAt).toDateString() === today).length;
      const rewardsToday = rewards.docs.filter(d => new Date(d.data().createdAt).toDateString() === today).length;

      el.innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
            <p class="text-gray-600 text-xs font-bold">🏆 Missions ทั้งหมด</p>
            <p class="text-3xl font-black text-blue-600 mt-2">${missions.size}</p>
            <p class="text-xs text-gray-500 mt-1">วันนี้: ${missionsToday}</p>
          </div>
          <div class="bg-pink-50 border border-pink-200 rounded-lg p-4">
            <p class="text-gray-600 text-xs font-bold">🎁 Rewards ทั้งหมด</p>
            <p class="text-3xl font-black text-pink-600 mt-2">${rewards.size}</p>
            <p class="text-xs text-gray-500 mt-1">วันนี้: ${rewardsToday}</p>
          </div>
          <div class="bg-purple-50 border border-purple-200 rounded-lg p-4">
            <p class="text-gray-600 text-xs font-bold">👥 Users ทั้งหมด</p>
            <p class="text-3xl font-black text-purple-600 mt-2">${users.size}</p>
            <p class="text-xs text-gray-500 mt-1">Active users</p>
          </div>
          <div class="bg-orange-50 border border-orange-200 rounded-lg p-4">
            <p class="text-gray-600 text-xs font-bold">🧾 Redemptions</p>
            <p class="text-3xl font-black text-orange-600 mt-2">${redemptions.size}</p>
            <p class="text-xs text-gray-500 mt-1">Total exchanges</p>
          </div>
        </div>
      `;
    } catch (err) {
      el.innerHTML = `<p class="text-red-500 font-bold p-4">❌ เกิดข้อผิดพลาด: ${escapeHtml(err.message)}</p>`;
    }
  };

  window.showSection = async (section) => {
    if (!isAdmin) return;
    currentSection = section;
    document.querySelectorAll('.admin-tab').forEach(b=>b.className='admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-gray-200 text-gray-600');
    const activeTab = [...document.querySelectorAll('.admin-tab')]
      .find(b => b.getAttribute('onclick') === `showSection('${section}')`);
    if (activeTab) activeTab.className='admin-tab px-4 py-2 rounded-lg text-sm font-bold bg-blue-500 text-white';

    if (section === 'dashboard') {
      return await loadDashboard();
    }

    // Health Recording section
    if (section === 'healthRecording') {
      return await loadHealthRecording();
    }

    const el = document.getElementById('sectionContent');
    el.innerHTML = '<p class="text-gray-400 text-sm animate-pulse">กำลังโหลด…</p>';

    try {
      const snap = await getDocs(collection(db, section));
      const docs = snap.docs
        .map(d=>({_id:d.id,...d.data()}))
        .sort((a,b)=>String(b.createdAt || b.redeemedAt || '').localeCompare(String(a.createdAt || a.redeemedAt || '')));

      if (!docs.length) {
        el.innerHTML = `<p class="text-gray-400 text-sm p-4">ไม่มีข้อมูล</p>`;
        if (section === 'rewards') {
          el.innerHTML += `<button onclick="openRewardModal()" class="mt-4 bg-green-500 text-white text-sm font-bold px-4 py-2 rounded-lg">➕ เพิ่มรางวัล</button>`;
        }
        if (section === 'missions') {
          el.innerHTML += `<button onclick="openMissionModal()" class="mt-4 bg-green-500 text-white text-sm font-bold px-4 py-2 rounded-lg">➕ เพิ่มภารกิจ</button>`;
        }
        return;
      }

      if (section === 'missions') {
        renderMissions(docs);
      } else if (section === 'rewards') {
        renderRewards(docs);
      } else {
        renderTable(section, docs);
      }
    } catch (err) {
      el.innerHTML = `<p class="text-red-500 font-bold p-4">❌ เกิดข้อผิดพลาด: ${escapeHtml(err.message)}</p>`;
    }
  };

  const renderMissions = (missions) => {
    const el = document.getElementById('sectionContent');
    let html = `<div class="flex justify-between items-center mb-4">
      <p class="text-sm font-bold text-gray-600">${missions.length} ภารกิจ</p>
      <button onclick="openMissionModal()" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-4 py-2 rounded-lg">➕ เพิ่ม</button>
    </div><div class="space-y-2">`;

    missions.forEach(m => {
      html += `<div class="bg-gray-50 border border-gray-200 rounded-lg p-4 flex justify-between items-start">
        <div>
          <p class="font-bold text-gray-800"><span class="text-lg">${escapeHtml(m.icon || '🏆')}</span> ${escapeHtml(m.title)}</p>
          <p class="text-xs text-gray-600 mt-1">${escapeHtml(m.desc || '')}</p>
          <p class="text-sm font-bold text-blue-600 mt-2">⭐ ${escapeHtml(m.points)} แต้ม</p>
        </div>
        <div class="flex gap-2">
          <button onclick="editMission('${m._id}')" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded">✏️ แก้ไข</button>
          <button onclick="deleteRow('missions','${m._id}')" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded">🗑 ลบ</button>
        </div>
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
  };

  const renderRewards = (rewards) => {
    const el = document.getElementById('sectionContent');
    let html = `<div class="flex justify-between items-center mb-4">
      <p class="text-sm font-bold text-gray-600">${rewards.length} รางวัล</p>
      <button onclick="openRewardModal()" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-4 py-2 rounded-lg">➕ เพิ่ม</button>
    </div><div class="space-y-2">`;

    rewards.forEach(r => {
      html += `<div class="bg-gray-50 border border-gray-200 rounded-lg p-4 flex justify-between items-start">
        <div>
          <p class="font-bold text-gray-800"><span class="text-lg">${escapeHtml(r.image || '🎁')}</span> ${escapeHtml(r.title)}</p>
          <p class="text-xs text-gray-600 mt-1">${escapeHtml(r.description || '')}</p>
          <p class="text-sm font-bold text-pink-600 mt-2">💰 ต้องใช้ ${escapeHtml(r.points)} แต้ม</p>
        </div>
        <div class="flex gap-2">
          <button onclick="editReward('${r._id}')" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded">✏️ แก้ไข</button>
          <button onclick="deleteRow('rewards','${r._id}')" class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded">🗑 ลบ</button>
        </div>
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
  };

  const renderTable = (section, docs) => {
    const el = document.getElementById('sectionContent');
    const cols = Object.keys(docs[0]).filter(k=>k!=='_id');
    let html = `<div class="flex justify-between items-center mb-3">
      <p class="text-sm font-bold text-gray-600">${docs.length} รายการ</p>
    </div><div class="overflow-x-auto"><table><thead><tr><th>#</th>${cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}<th>Action</th></tr></thead><tbody>`;

    docs.forEach((d,i) => {
      html += `<tr>
        <td class="text-gray-400">${i+1}</td>
        ${cols.map(c=>{
          const v = d[c];
          const raw = typeof v === 'object' ? JSON.stringify(v) : String(v??'–');
          const display = raw.length>80 ? raw.slice(0,80)+'…' : raw;
          // FIX: escape ทั้ง title และเนื้อหาที่แสดง กัน XSS จากข้อมูลผู้ใช้
          return `<td class="max-w-xs truncate" title="${escapeHtml(raw)}">${escapeHtml(display)}</td>`;
        }).join('')}
        <td><button onclick="deleteRow('${section}','${d._id}')" class="text-red-400 hover:text-red-600 text-xs font-bold">🗑 ลบ</button></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;
  };

  window.deleteRow = async (col, id) => {
    if (!confirm(`ลบ ID: ${id} ?`)) return;
    try {
      await deleteDoc(doc(db, col, id));
      showToast('ลบข้อมูลสำเร็จ', 'success');
      window.showSection(currentSection);
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    }
  };

  // Reward Modal Functions
  window.openRewardModal = () => {
    editingRewardId = null;
    document.getElementById('rewardModalTitle').textContent = '➕ เพิ่มของรางวัล';
    ['rTitle','rPoints','rImage','rDesc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('rewardModal').classList.remove('hidden');
  };

  window.closeRewardModal = () => {
    document.getElementById('rewardModal').classList.add('hidden');
  };

  // ── FIX: ใช้ getDoc(doc(db,'rewards',id)) ดึงเอกสารเดียวตรงๆ ──
  // เดิมโหลดทั้ง collection แล้วค่อย find() เปลือง read quota และช้าลงเรื่อยๆ
  // เมื่อจำนวนรางวัลเพิ่มขึ้น
  window.editReward = async (id) => {
    editingRewardId = id;
    try {
      const snap = await getDoc(doc(db, 'rewards', id));
      if (!snap.exists()) return showToast('ไม่พบรางวัล', 'error');
      const reward = snap.data();

      document.getElementById('rewardModalTitle').textContent = '✏️ แก้ไขรางวัล';
      document.getElementById('rTitle').value = reward.title ?? '';
      document.getElementById('rPoints').value = reward.points ?? '';
      document.getElementById('rImage').value = reward.image ?? '';
      document.getElementById('rDesc').value = reward.description ?? '';
      document.getElementById('rewardModal').classList.remove('hidden');
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    }
  };

  window.saveReward = async () => {
    const title = document.getElementById('rTitle').value.trim();
    const pts   = parseInt(document.getElementById('rPoints').value)||0;
    const image = document.getElementById('rImage').value.trim();
    const desc  = document.getElementById('rDesc').value.trim();
    if (!title || !pts) return showToast('กรุณากรอก ชื่อ และ แต้ม', 'error');

    try {
      const data = { title, points: pts, image, description: desc };

      if (editingRewardId) {
        await updateDoc(doc(db, 'rewards', editingRewardId), data);
        showToast('อัปเดตรางวัลสำเร็จ', 'success');
      } else {
        await addDoc(collection(db,'rewards'), { ...data, createdAt: new Date().toISOString() });
        showToast('เพิ่มรางวัลสำเร็จ', 'success');
      }
      closeRewardModal();
      window.showSection('rewards');
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    }
  };

  // Health Recording Management
  const loadHealthRecording = async () => {
    const el = document.getElementById('sectionContent');
    el.innerHTML = '<p class="text-gray-400 text-sm animate-pulse">กำลังโหลด…</p>';

    try {
      // Get all users
      const userSnap = await getDocs(collection(db, 'users'));
      const users = userSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      let html = `
        <div class="space-y-4">
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
            <h3 class="font-black text-blue-900 mb-2">📋 Health Recording Management</h3>
            <p class="text-sm text-blue-700">Manage user access to health recording features</p>
          </div>

          <div class="bg-white border border-gray-200 rounded-lg p-4">
            <h4 class="font-bold text-gray-800 mb-3">Users & Recording Access Rights</h4>
            <div class="space-y-2">
              <div class="grid grid-cols-1 md:grid-cols-[1.1fr_1.1fr_1fr_2fr_auto] gap-3 items-center bg-gray-50 p-3 rounded-lg font-bold text-sm text-gray-600">
                <span>User</span>
                <span>Email</span>
                <span>Recording Enabled</span>
                <span>Data Access</span>
                <span>Action</span>
              </div>
      `;

      if (users.length === 0) {
        html += '<p class="text-gray-400 py-4">ไม่มีผู้ใช้</p>';
      } else {
        users.forEach(user => {
          const recordingEnabled = user.healthRecordingEnabled !== false;
          const access = user.bodyStatsAccess || {};
          html += `
            <div class="grid grid-cols-1 md:grid-cols-[1.1fr_1.1fr_1fr_2fr_auto] gap-3 items-center bg-white border border-gray-100 p-3 rounded-lg">
              <span class="font-bold text-gray-800">${escapeHtml(user.displayName || 'Unknown')}</span>
              <span class="text-sm text-gray-600">${escapeHtml(user.email || user.lineUid || '–')}</span>
              <span class="flex items-center gap-2">
                <input type="checkbox" id="rec_${user.id}" ${recordingEnabled ? 'checked' : ''}
                  onchange="toggleHealthRecording('${user.id}', this.checked)"
                  class="w-4 h-4 rounded cursor-pointer">
                <span class="text-xs ${recordingEnabled ? 'text-green-600 font-bold' : 'text-gray-400'}">${recordingEnabled ? '✓ Enabled' : '✗ Disabled'}</span>
              </span>
              <div class="grid grid-cols-2 gap-2 text-xs">
                <label class="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" ${access.height !== false ? 'checked' : ''}
                    onchange="toggleBodyStatsAccess('${user.id}', 'height', this.checked)">
                  <span>Height</span>
                </label>
                <label class="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" ${access.weight !== false ? 'checked' : ''}
                    onchange="toggleBodyStatsAccess('${user.id}', 'weight', this.checked)">
                  <span>Weight</span>
                </label>
                <label class="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" ${access.waist_hip ? 'checked' : ''}
                    onchange="toggleBodyStatsAccess('${user.id}', 'waist_hip', this.checked)">
                  <span>Waist/Hip</span>
                </label>
                <label class="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" ${access.bloodtest ? 'checked' : ''}
                    onchange="toggleBodyStatsAccess('${user.id}', 'bloodtest', this.checked)">
                  <span>Blood</span>
                </label>
              </div>
              <button onclick="viewUserHealthStats('${user.id}')" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded">📊 Stats</button>
            </div>
          `;
        });
      }

      html += `
            </div>
          </div>

          <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
            <h4 class="font-bold text-amber-900 mb-2">📝 Recording Features</h4>
            <ul class="text-sm text-amber-800 space-y-1">
              <li>✓ Quick daily tracking (weight, blood sugar, pressure)</li>
              <li>✓ Detailed body statistics (height, waist, hip, etc.)</li>
              <li>✓ Blood test results</li>
              <li>✓ Access control per metric</li>
            </ul>
          </div>
        </div>
      `;

      el.innerHTML = html;
    } catch (err) {
      el.innerHTML = `<p class="text-red-500 font-bold p-4">❌ เกิดข้อผิดพลาด: ${escapeHtml(err.message)}</p>`;
    }
  };

  // Toggle health recording access for user
  window.toggleHealthRecording = async (userId, enabled) => {
    try {
      await updateDoc(doc(db, 'users', userId), { healthRecordingEnabled: enabled });
      showToast(enabled ? '✓ เปิดการบันทึกสุขภาพ' : '✗ ปิดการบันทึกสุขภาพ', 'success');
      loadHealthRecording(); // Reload
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    }
  };

  window.toggleBodyStatsAccess = async (userId, key, enabled) => {
    try {
      const userRef = doc(db, 'users', userId);
      const snap = await getDoc(userRef);
      const current = snap.data()?.bodyStatsAccess || {};
      await updateDoc(userRef, {
        bodyStatsAccess: {
          ...current,
          [key]: enabled,
          updatedAt: new Date().toISOString()
        }
      });
      showToast('Updated health data permission', 'success');
      loadHealthRecording();
    } catch (err) {
      showToast('Update failed: ' + err.message, 'error');
    }
  };

  // View user's health statistics
  window.viewUserHealthStats = async (userId) => {
    const el = document.getElementById('sectionContent');
    el.innerHTML = '<p class="text-gray-400 text-sm animate-pulse">กำลังโหลด…</p>';

    try {
      const userDoc = await getDoc(doc(db, 'users', userId));
      const user = userDoc.data() || {};

      // Get body stats
      const bodyStatsSnap = await getDocs(query(
        collection(db, 'bodyStats'),
        where('uid', '==', userId)
      ));
      const bodyStats = bodyStatsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Get health logs
      const healthLogsSnap = await getDocs(query(
        collection(db, 'healthLogs'),
        where('uid', '==', userId)
      ));
      const healthLogs = healthLogsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      let html = `
        <div class="space-y-4">
          <div class="bg-white border border-gray-200 rounded-lg p-4">
            <div class="flex items-center justify-between mb-4">
              <div>
                <h3 class="font-black text-gray-800">${escapeHtml(user.displayName || 'Unknown User')}</h3>
                <p class="text-xs text-gray-500">${escapeHtml(user.email || '–')}</p>
              </div>
              <button onclick="loadHealthRecording()" class="bg-gray-500 hover:bg-gray-600 text-white text-xs font-bold px-3 py-1.5 rounded">← Back</button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4">
              <p class="text-gray-600 text-xs font-bold">📊 Body Statistics Records</p>
              <p class="text-3xl font-black text-green-600 mt-2">${bodyStats.length}</p>
              <p class="text-xs text-gray-500 mt-1">Detailed measurements</p>
            </div>
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
              <p class="text-gray-600 text-xs font-bold">📋 Health Log Entries</p>
              <p class="text-3xl font-black text-blue-600 mt-2">${healthLogs.length}</p>
              <p class="text-xs text-gray-500 mt-1">Daily tracking</p>
            </div>
          </div>

          <div class="bg-white border border-gray-200 rounded-lg p-4">
            <h4 class="font-bold text-gray-800 mb-3">Latest Body Statistics</h4>
            ${bodyStats.length === 0
              ? '<p class="text-gray-400 text-sm">ไม่มีข้อมูล</p>'
              : `<table><thead><tr><th>Date</th><th>Height</th><th>Weight</th><th>Waist</th><th>Hip</th></tr></thead><tbody>
                  ${bodyStats.slice(-5).reverse().map(s => `
                    <tr>
                      <td>${escapeHtml(new Date(s.createdAt).toLocaleString('th-TH'))}</td>
                      <td>${escapeHtml(s.height || '–')} cm</td>
                      <td>${escapeHtml(s.weight || '–')} kg</td>
                      <td>${escapeHtml(s.waist || '–')} cm</td>
                      <td>${escapeHtml(s.hip || '–')} cm</td>
                    </tr>
                  `).join('')}
                </tbody></table>`
            }
          </div>
        </div>
      `;

      el.innerHTML = html;
    } catch (err) {
      el.innerHTML = `<p class="text-red-500 font-bold p-4">❌ เกิดข้อผิดพลาด: ${escapeHtml(err.message)}</p>`;
    }
  };

  // Mission Modal Functions
  window.openMissionModal = () => {
    editingMissionId = null;
    document.getElementById('missionModalTitle').textContent = '➕ เพิ่มภารกิจ';
    ['mTitle','mPoints','mIcon','mDesc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('missionModal').classList.remove('hidden');
  };

  window.closeMissionModal = () => {
    document.getElementById('missionModal').classList.add('hidden');
  };

  // ── FIX: ใช้ getDoc(doc(db,'missions',id)) ดึงเอกสารเดียวตรงๆ แทนการโหลดทั้ง collection ──
  window.editMission = async (id) => {
    editingMissionId = id;
    try {
      const snap = await getDoc(doc(db, 'missions', id));
      if (!snap.exists()) return showToast('ไม่พบภารกิจ', 'error');
      const mission = snap.data();

      document.getElementById('missionModalTitle').textContent = '✏️ แก้ไขภารกิจ';
      document.getElementById('mTitle').value = mission.title ?? '';
      document.getElementById('mPoints').value = mission.points ?? '';
      document.getElementById('mIcon').value = mission.icon ?? '';
      document.getElementById('mDesc').value = mission.desc ?? '';
      document.getElementById('missionModal').classList.remove('hidden');
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    }
  };

  window.saveMission = async () => {
    const title  = document.getElementById('mTitle').value.trim();
    const pts    = parseInt(document.getElementById('mPoints').value)||0;
    const icon   = document.getElementById('mIcon').value.trim();
    const desc   = document.getElementById('mDesc').value.trim();
    if (!title || !pts) return showToast('กรุณากรอก ชื่อ และ แต้ม', 'error');

    try {
      const data = { title, points: pts, icon, desc };

      if (editingMissionId) {
        await updateDoc(doc(db, 'missions', editingMissionId), data);
        showToast('อัปเดตภารกิจสำเร็จ', 'success');
      } else {
        await addDoc(collection(db,'missions'), { ...data, createdAt: new Date().toISOString() });
        showToast('เพิ่มภารกิจสำเร็จ', 'success');
      }
      closeMissionModal();
      window.showSection('missions');
    } catch (err) {
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    }
  };

  // Auto-load dashboard on page load
  if (isAdmin) {
    loadDashboard();
  }
</script>
</body>
</html>
