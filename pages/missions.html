<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VitalVibe – ภารกิจ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family:'Prompt',sans-serif; -webkit-tap-highlight-color:transparent; }
    body { background:#fffbeb; }
    .pb-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px)); }
    .hide-scrollbar::-webkit-scrollbar{display:none} .hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .35s ease-out forwards}
    @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
    .pop{animation:pop .3s ease-out}
    html, body { height: 100%; height: 100dvh; width: 100%; }
    body { margin: 0; padding: 0; }
    .tab-active{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;}
    .tab-inactive{color:#9ca3af;background:transparent;}
  </style>
</head>
<body class="h-screen w-screen overflow-hidden">
<div class="h-dvh w-screen sm:w-full sm:max-w-none bg-white relative flex flex-col">
  <!-- Responsive container wrapper -->
  <div class="flex-1 flex flex-col w-full max-w-full overflow-hidden">

    <!-- Header -->
    <div class="flex-shrink-0 pt-8 sm:pt-6 pb-3 px-5 bg-white border-b border-gray-100 sm:border-b-2">
      <div class="flex items-center justify-between mb-3">
        <h1 class="text-xl sm:text-2xl font-black text-gray-900 truncate">🏆 ภารกิจ</h1>
        <div class="flex items-center gap-1 bg-yellow-50 border border-yellow-200 rounded-full px-3 py-1 flex-shrink-0">
          <span class="text-base">⭐</span>
          <span id="myPoints" class="font-black text-yellow-600 text-sm">0</span>
          <span class="text-xs opacity-75">แต้ม</span>
        </div>
      </div>
      <!-- Tabs -->
      <div class="grid grid-cols-4 gap-1 bg-gray-100 rounded-2xl p-1">
        <button id="tabMissions"    onclick="switchTab('missions')"    class="tab-active py-2 rounded-xl text-xs font-black transition">🏆 ภารกิจ</button>
        <button id="tabLeaderboard" onclick="switchTab('leaderboard')" class="tab-inactive py-2 rounded-xl text-xs font-black transition">🏅 Ranking</button>
        <button id="tabRewards"     onclick="switchTab('rewards')"     class="tab-inactive py-2 rounded-xl text-xs font-black transition">🎁 รางวัล</button>
        <button id="tabHistory"     onclick="switchTab('history')"     class="tab-inactive py-2 rounded-xl text-xs font-black transition">📜 ประวัติ</button>
      </div>
    </div>

    <!-- Scroll area -->
    <div class="flex-1 overflow-y-auto hide-scrollbar px-0 pb-20 sm:pb-6">

    <!-- Panel: Missions -->
    <div id="panelMissions" class="px-5 pt-4 space-y-3">
      <p class="text-xs text-gray-400 font-semibold">ทำภารกิจให้ครบเงื่อนไขก่อนรับแต้ม</p>
      <div id="missionList"><p class="text-center text-gray-300 py-10 font-bold">กำลังโหลด...</p></div>
    </div>

    <!-- Panel: Leaderboard -->
    <div id="panelLeaderboard" class="hidden px-5 pt-4 space-y-3">
      <!-- อันดับของฉัน -->
      <div class="bg-amber-50 border border-amber-200 rounded-2xl p-3 flex items-center gap-3">
        <span class="text-2xl">👤</span>
        <div class="flex-1">
          <p class="text-xs text-gray-400 font-bold">อันดับของคุณสัปดาห์นี้</p>
          <p id="myRank" class="font-black text-gray-800 text-lg"># –</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-gray-400">แต้มสะสม</p>
          <p id="myPointsRank" class="font-black text-yellow-600">0 ⭐</p>
        </div>
      </div>
      <div id="leaderboardList"><p class="text-center text-gray-300 py-10 font-bold">กำลังโหลด...</p></div>
    </div>

    <!-- Panel: Rewards -->
    <div id="panelRewards" class="hidden px-5 pt-4">
      <p class="text-xs text-gray-400 font-semibold mb-3">แลกแต้มเป็นของรางวัล</p>
      <div id="rewardGrid" class="grid grid-cols-2 gap-3"></div>
    </div>

    <!-- Panel: History -->
    <div id="panelHistory" class="hidden px-5 pt-4 space-y-2">
      <p class="text-xs text-gray-400 font-semibold mb-1">ประวัติการแลกแต้ม</p>
      <div id="redemptionHistory"></div>
    </div>

  </div>

  <!-- Shipping Modal -->
  <div id="shippingModal" class="hidden fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-[999]">
    <div class="w-full max-w-md bg-white rounded-t-3xl sm:rounded-3xl p-5 max-h-[88vh] overflow-y-auto shadow-2xl flex flex-col">
      <div class="flex items-center justify-between mb-4 flex-shrink-0">
        <h3 class="text-lg font-black text-gray-900">📦 ที่อยู่จัดส่ง</h3>
        <button onclick="closeShippingModal()" class="text-2xl text-gray-400 leading-none">✕</button>
      </div>
      <div class="space-y-3 flex-1 overflow-y-auto hide-scrollbar">
        <div>
          <label class="text-xs text-gray-400 font-bold uppercase">ชื่อผู้รับ</label>
          <input id="recipientName" type="text" placeholder="เช่น สมชาย ใจดี" class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold">
        </div>
        <div>
          <label class="text-xs text-gray-400 font-bold uppercase">เบอร์โทรศัพท์</label>
          <input id="recipientPhone" type="tel" placeholder="0812345678" class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold">
        </div>
        <div>
          <label class="text-xs text-gray-400 font-bold uppercase">อีเมล</label>
          <input id="recipientEmail" type="email" placeholder="email@example.com" class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold">
        </div>
        <div>
          <label class="text-xs text-gray-400 font-bold uppercase">ที่อยู่จัดส่ง</label>
          <textarea id="recipientAddress" placeholder="เลขที่ ซ.ถนน อ.เขต จ.จังหวัด รหัสไปรษณีย์" class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold h-20 resize-none"></textarea>
        </div>
      </div>
      <div class="mt-4 flex gap-2 flex-shrink-0 pb-safe">
        <button onclick="closeShippingModal()" class="flex-1 border-2 border-gray-200 text-gray-500 font-black py-3 rounded-2xl text-sm active:scale-95 transition">ยกเลิก</button>
        <button onclick="confirmRedemption()" class="flex-1 bg-gradient-to-r from-amber-400 to-orange-500 text-white font-black py-3 rounded-2xl text-sm shadow-md active:scale-95 transition">ยืนยันการแลก ✓</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur border-t border-gray-100 flex items-center justify-around pb-safe z-50 shadow-2xl min-h-20">
    <a href="food.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center">
      <span class="text-xl">🍱</span><span class="text-[10px] font-bold">อาหาร</span></a>
    <a href="reminders.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center">
      <span class="text-xl">⏰</span><span class="text-[10px] font-bold">เตือน</span></a>
    <a href="missions.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-amber-500 flex-1 justify-center">
      <span class="text-xl">🏆</span><span class="text-[10px] font-bold">ภารกิจ</span></a>
    <a href="profile.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center">
      <span class="text-xl">👤</span><span class="text-[10px] font-bold">โปรไฟล์</span></a>
  </nav>

</div>

<script type="module">
  import { requireAuth } from '../lib/auth.js';
  import { db } from '../lib/firebase.js';
  import {
    collection, doc, getDoc, getDocs, addDoc, setDoc, updateDoc,
    query, where, orderBy, limit, onSnapshot, increment, runTransaction
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const session = requireAuth();
  if (!session) await new Promise(() => {});
  const uid  = session.uid;
  const week = getWeekKey();
  let missionsById = new Map();
  let currentTab = 'missions';
  let currentRedeem = null;

  function getWeekKey() {
    const d = new Date();
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const wk   = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${String(wk).padStart(2,'0')}`;
  }

  function formatLocalDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  // ── Points realtime ────────────────────────────────────────
  onSnapshot(doc(db,'users',uid), snap => {
    const points = snap.data()?.points || 0;
    document.getElementById('myPoints').textContent = points.toLocaleString();
    document.getElementById('myPointsRank').textContent = points.toLocaleString() + ' ⭐';
  });

  // ── Tabs ───────────────────────────────────────────────────
  const TABS = ['missions','leaderboard','rewards','history'];
  window.switchTab = (tab) => {
    currentTab = tab;
    TABS.forEach(t => {
      const panel = document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1));
      const btn   = document.getElementById('tab'   + t.charAt(0).toUpperCase() + t.slice(1));
      if (panel) panel.classList.toggle('hidden', t !== tab);
      if (btn)   btn.className = `py-2 rounded-xl text-xs font-black transition ${t === tab ? 'tab-active' : 'tab-inactive'}`;
    });
    if (tab === 'leaderboard') loadLeaderboard();
    if (tab === 'rewards')     loadRewards();
    if (tab === 'history')     loadRedemptionHistory();
  };

  // ── Missions ───────────────────────────────────────────────
  const DEFAULT_MISSIONS = [
    { id:'m_food3',   icon:'🍱', title:'บันทึกอาหาร 3 มื้อ',    desc:'บันทึกอาหารครบ 3 มื้อในวันนี้',  points:50,  target:3,  type:'food' },
    { id:'m_weight',  icon:'⚖️', title:'ชั่งน้ำหนักวันนี้',      desc:'บันทึกน้ำหนักอย่างน้อย 1 ครั้ง', points:20,  target:1,  type:'weight' },
    { id:'m_log3',    icon:'📋', title:'บันทึกสุขภาพ 3 ครั้ง',   desc:'บันทึกค่าสุขภาพใดก็ได้ 3 ครั้ง', points:45,  target:3,  type:'health' },
    { id:'m_photo',   icon:'📷', title:'ถ่ายรูปอาหาร',            desc:'ใช้ Gemini วิเคราะห์อาหาร 1 มื้อ',points:40,  target:1,  type:'photo' },
    { id:'m_goal_ok', icon:'🎯', title:'กินไม่เกินเป้าหมาย',      desc:'มีบันทึกอาหารวันนี้และแคลอรี่ไม่เกินเป้าหมาย', points:30, target:1, type:'calorieGoal' },
  ];

  async function loadMissions() {
    const today = formatLocalDate(new Date());
    const mSnap = await getDocs(collection(db,'missions'));
    const allowedTypes = new Set(['food','weight','health','photo','calorieGoal']);
    const missions = (mSnap.empty
      ? DEFAULT_MISSIONS
      : mSnap.docs.map(d=>({id:d.id,...d.data()})))
      .filter(m => allowedTypes.has(m.type));
    missionsById = new Map(missions.map(m => [m.id, m]));
    const progress = await calculateMissionProgress(missions, today);

    const cSnap = await getDocs(query(
      collection(db,'missionCompletions'),
      where('uid','==',uid),
      where('date','==',today)
    ));
    const completed = new Set(cSnap.docs.map(d=>d.data().missionId));
    renderMissions(missions, completed, progress);
  }

  async function calculateMissionProgress(missions, today) {
    const [foodSnap, healthSnap, userSnap] = await Promise.all([
      getDocs(query(collection(db,'foodLogs'), where('uid','==',uid), where('date','==',today))),
      getDocs(query(collection(db,'healthLogs'), where('uid','==',uid))),
      getDoc(doc(db,'users',uid))
    ]);
    const foods = foodSnap.docs.map(d=>({id:d.id,...d.data()}));
    const healthLogs = healthSnap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(e => e.createdAt && formatLocalDate(new Date(e.createdAt)) === today);
    const meals = new Set(foods.map(e => e.meal).filter(Boolean));
    const calorieTotal = foods.reduce((sum,e)=>sum+(Number(e.calories)||0),0);
    const calorieGoal = Number(userSnap.data()?.calorieGoal) || 2000;
    const progress = new Map();
    missions.forEach(m => {
      const target = Number(m.target) || 1;
      let value = 0;
      if (m.type === 'food') value = meals.size;
      if (m.type === 'photo') value = foods.filter(e => e.source === 'ai' || e.analyzedBy === 'gemini').length;
      if (m.type === 'weight') value = healthLogs.filter(e => e.type === 'weight').length;
      if (m.type === 'health') value = healthLogs.length;
      if (m.type === 'calorieGoal') value = foods.length > 0 && calorieTotal <= calorieGoal ? 1 : 0;
      progress.set(m.id, {
        value: Math.min(value, target),
        target,
        claimable: value >= target,
        detail: m.type === 'calorieGoal'
          ? `${calorieTotal.toLocaleString()} / ${calorieGoal.toLocaleString()} kcal`
          : `${Math.min(value, target)} / ${target}`
      });
    });
    return progress;
  }

  function renderMissions(missions, completed, progress) {
    const html = missions.map(m => {
      const done = completed.has(m.id);
      const p = progress.get(m.id) || { value:0, target:Number(m.target)||1, claimable:false, detail:`0 / ${m.target||1}` };
      return `<div class="fade-in bg-white border ${done?'border-green-200 bg-green-50':'border-gray-100'} rounded-3xl p-4 shadow-sm flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl ${done?'bg-green-100':'bg-amber-50'} flex items-center justify-center text-3xl flex-shrink-0">${done?'✅':m.icon}</div>
        <div class="flex-1 min-w-0">
          <p class="font-black text-gray-800 text-sm">${m.title}</p>
          <p class="text-xs text-gray-400 mt-0.5 leading-snug">${m.desc}</p>
          <div class="flex items-center gap-1 mt-1">
            <span class="text-xs font-black text-yellow-500">+${m.points} แต้ม</span>
            <span class="text-xs font-black text-gray-300">· ${p.detail}</span>
          </div>
        </div>
        ${done
          ? `<span class="text-xs font-black text-green-500 flex-shrink-0">สำเร็จ ✓</span>`
          : `<button onclick="completeMission('${m.id}')" ${p.claimable ? '' : 'disabled'}
              class="flex-shrink-0 ${p.claimable ? 'bg-gradient-to-r from-amber-400 to-orange-500 text-white shadow-md active:scale-95' : 'bg-gray-100 text-gray-300'} font-black text-xs px-4 py-2 rounded-2xl transition">
              รับแต้ม
            </button>`
        }
      </div>`;
    }).join('');
    document.getElementById('missionList').innerHTML = html || '<p class="text-center text-gray-300 py-10 font-bold">ยังไม่มีภารกิจ</p>';
  }

  window.completeMission = async (missionId) => {
    const mission = missionsById.get(missionId);
    if (!mission) return alert('Mission not found');
    const points = Number(mission.points) || 0;
    const today = formatLocalDate(new Date());
    const progress = await calculateMissionProgress([mission], today);
    if (!progress.get(missionId)?.claimable) return alert('ยังทำภารกิจไม่ครบเงื่อนไข');
    const cSnap = await getDocs(query(
      collection(db,'missionCompletions'),
      where('uid','==',uid),
      where('missionId','==',missionId),
      where('date','==',today)
    ));
    if (!cSnap.empty) return alert('ทำภารกิจนี้ไปแล้ววันนี้');
    await addDoc(collection(db,'missionCompletions'),{
      uid, missionId, points, date: today,
      completedAt: new Date().toISOString()
    });
    await runTransaction(db, async (transaction) => {
      const userRef = doc(db,'users',uid);
      const userSnap = await transaction.get(userRef);
      const currentPoints = userSnap.data()?.points || 0;
      transaction.update(userRef, { points: currentPoints + points });
      const txRef = doc(collection(db,'transactions'));
      transaction.set(txRef, {
        uid, type: 'earn', amount: points,
        reason: `mission_${missionId}`, missionId,
        missionTitle: mission.title,
        timestamp: new Date().toISOString(),
        balance: currentPoints + points
      });
    });
    loadMissions();
  };

  // ── Leaderboard ────────────────────────────────────────────
  async function loadLeaderboard() {
    document.getElementById('leaderboardList').innerHTML = '<p class="text-center text-gray-300 py-10 font-bold">กำลังโหลด...</p>';
    try {
      const q9 = query(
        collection(db,'leaderboard'),
        where('week','==',week),
        orderBy('points','desc'),
        limit(9)
      );
      const qAll = query(
        collection(db,'leaderboard'),
        where('week','==',week),
        orderBy('points','desc')
      );
      const [snap9, snapAll] = await Promise.all([getDocs(q9), getDocs(qAll)]);
      const top9     = snap9.docs.map(d=>({id:d.id,...d.data()}));
      const allUsers = snapAll.docs.map(d=>({id:d.id,...d.data()}));
      const myRank   = allUsers.findIndex(e => e.uid === uid) + 1;
      document.getElementById('myRank').textContent = myRank ? `# ${myRank}` : '# –';
      renderLeaderboard(top9, myRank, allUsers.length);
    } catch(err) {
      document.getElementById('leaderboardList').innerHTML = '<p class="text-center text-gray-300 py-10 font-bold">โหลดข้อมูลไม่สำเร็จ</p>';
      console.error('Leaderboard error:', err);
    }
  }

  function renderLeaderboard(top9, myRank, total) {
    const medals = ['🥇','🥈','🥉'];
    if (!top9.length) {
      document.getElementById('leaderboardList').innerHTML =
        `<div class="text-center text-gray-300 py-10"><p class="text-4xl mb-2">🏅</p><p class="font-bold text-gray-400">ยังไม่มีข้อมูลสัปดาห์นี้</p></div>`;
      return;
    }
    let html = top9.map((e, i) => {
      const isMe = e.uid === uid;
      return `<div class="fade-in flex items-center gap-3 ${isMe?'bg-amber-50 border border-amber-200':'bg-white border border-gray-100'} rounded-2xl p-3 shadow-sm">
        <span class="text-xl w-8 text-center flex-shrink-0">${medals[i] || `${i+1}`}</span>
        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-xl flex-shrink-0 overflow-hidden">
          ${e.avatar?.startsWith('http') ? `<img src="${e.avatar}" class="w-full h-full object-cover">` : (e.avatar||'👦🏻')}
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-black text-gray-800 text-sm truncate">${e.displayName||'ผู้ใช้'}${isMe?' (คุณ)':''}</p>
        </div>
        <p class="font-black text-yellow-600 flex-shrink-0">⭐ ${(e.points||0).toLocaleString()}</p>
      </div>`;
    }).join('');

    if (myRank > 9) {
      html += `<div class="flex items-center gap-2 py-2 px-3"><div class="flex-1 border-t border-dashed border-gray-200"></div><span class="text-xs text-gray-300 flex-shrink-0 px-2">···</span><div class="flex-1 border-t border-dashed border-gray-200"></div></div>`;
      html += `<div class="fade-in flex items-center gap-3 bg-amber-50 border border-amber-300 rounded-2xl p-3 shadow-sm">
        <span class="text-sm font-black text-gray-500 w-8 text-center flex-shrink-0">#${myRank}</span>
        <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-xl flex-shrink-0 overflow-hidden">
          ${session.avatar?.startsWith('http') ? `<img src="${session.avatar}" class="w-full h-full object-cover">` : '👤'}
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-black text-gray-800 text-sm truncate">${session.displayName||'คุณ'} (คุณ)</p>
          <p class="text-xs text-gray-400">อีก ${myRank - 9} อันดับถึง Top 9</p>
        </div>
      </div>`;
    }
    document.getElementById('leaderboardList').innerHTML = html;
  }

  // ── Rewards ────────────────────────────────────────────────
  async function loadRewards() {
    document.getElementById('rewardGrid').innerHTML = '<p class="col-span-2 text-center text-gray-300 py-8 font-bold">กำลังโหลด...</p>';
    const snap = await getDocs(collection(db, 'rewards'));
    const rewards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('rewardGrid').innerHTML = rewards.length
      ? rewards.map(r => `<div class="fade-in bg-white border border-gray-100 rounded-3xl p-4 shadow-sm flex flex-col items-center text-center">
          <div class="w-full aspect-square bg-amber-50 rounded-2xl flex items-center justify-center text-5xl mb-3">${r.image || '🎁'}</div>
          <h4 class="font-black text-gray-800 text-xs mb-1 leading-tight">${r.title}</h4>
          <p class="text-[10px] text-gray-400 mb-3">${r.description || ''}</p>
          <button onclick="openShippingModal('${r.id}','${r.title}',${r.points})" class="w-full bg-gradient-to-r from-amber-400 to-orange-500 text-white font-black py-2.5 rounded-xl text-xs shadow active:scale-95 transition">แลก ${(r.points || 0).toLocaleString()} ⭐</button>
        </div>`).join('')
      : `<div class="col-span-2 text-center text-gray-300 py-6 border-2 border-dashed border-gray-200 rounded-3xl font-bold">ยังไม่มีของรางวัลในระบบ</div>`;
  }

  // ── Redemption history ─────────────────────────────────────
  async function loadRedemptionHistory() {
    document.getElementById('redemptionHistory').innerHTML = '<p class="text-center text-gray-300 py-8 font-bold">กำลังโหลด...</p>';
    const snap = await getDocs(query(collection(db, 'redemptions'), where('uid', '==', uid)));
    const entries = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => String(b.redeemedAt || '').localeCompare(String(a.redeemedAt || '')));
    const sL = { pending: 'รอยืนยัน', confirmed: 'ยืนยันแล้ว', delivered: 'ส่งแล้ว' };
    const sC = { pending: 'text-yellow-500', confirmed: 'text-blue-500', delivered: 'text-green-500' };
    document.getElementById('redemptionHistory').innerHTML = entries.length
      ? entries.map(e => `<div class="fade-in bg-white border border-gray-100 rounded-2xl p-3 flex items-center gap-3 shadow-sm">
          <span class="text-2xl">🎁</span>
          <div class="flex-1 min-w-0"><p class="font-bold text-gray-800 text-sm truncate">${e.title || e.rewardTitle}</p><p class="text-xs text-gray-400">${new Date(e.redeemedAt).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}</p></div>
          <div class="text-right flex-shrink-0"><p class="text-xs font-black text-red-400">-${e.cost || e.pointsCost} ⭐</p><p class="text-[10px] font-bold ${sC[e.status] || 'text-gray-400'}">${sL[e.status] || e.status}</p></div>
        </div>`).join('')
      : `<p class="text-center text-gray-300 py-6 font-bold text-sm">ยังไม่มีประวัติการแลก</p>`;
  }

  // ── Shipping Modal ─────────────────────────────────────────
  window.openShippingModal = async (rewardId, title, cost) => {
    const pts = (await getDoc(doc(db, 'users', uid))).data()?.points || 0;
    if (pts < cost) return alert(`แต้มไม่พอ (มี ${pts} แต้ม ต้องการ ${cost} แต้ม)`);
    currentRedeem = { rewardId, title, cost };
    document.getElementById('shippingModal').classList.remove('hidden');
  };

  window.closeShippingModal = () => {
    currentRedeem = null;
    document.getElementById('shippingModal').classList.add('hidden');
    ['recipientName','recipientPhone','recipientEmail','recipientAddress'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
  };

  window.confirmRedemption = async () => {
    if (!currentRedeem) return;
    const name    = document.getElementById('recipientName').value.trim();
    const phone   = document.getElementById('recipientPhone').value.trim();
    const email   = document.getElementById('recipientEmail').value.trim();
    const address = document.getElementById('recipientAddress').value.trim();
    if (!name || !phone || !email || !address) return alert('กรุณากรอกข้อมูลให้ครบ');
    if (!/^0[0-9]{9}/.test(phone)) return alert('เบอร์โทรไม่ถูกต้อง');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert('อีเมลไม่ถูกต้อง');
    try {
      await runTransaction(db, async (tx) => {
        const uRef  = doc(db, 'users', uid);
        const uSnap = await tx.get(uRef);
        const pts = uSnap.data()?.points || 0;
        if (pts < currentRedeem.cost) throw new Error('NOT_ENOUGH');
        tx.set(doc(collection(db, 'redemptions')), {
          uid, rewardId: currentRedeem.rewardId, rewardTitle: currentRedeem.title,
          pointsCost: currentRedeem.cost, status: 'pending',
          shippingAddress: { recipientName: name, recipientPhone: phone, recipientEmail: email, address },
          redeemedAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        });
        tx.set(doc(collection(db, 'transactions')), {
          uid, type: 'spend', amount: currentRedeem.cost,
          reason: `redeem_${currentRedeem.rewardId}`, rewardTitle: currentRedeem.title,
          timestamp: new Date().toISOString(), balance: pts - currentRedeem.cost
        });
        tx.update(uRef, { points: pts - currentRedeem.cost });
      });
      closeShippingModal();
      alert('🎉 แลกของรางวัลสำเร็จ!');
      loadRedemptionHistory();
    } catch(e) {
      if (e.message === 'NOT_ENOUGH') return alert('แต้มไม่พอ');
      alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
    }
  };

  loadMissions();
</script>
</body>
