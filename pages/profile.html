<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VitalVibe – โปรไฟล์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family:'Prompt',sans-serif; -webkit-tap-highlight-color:transparent; }
    body { background:#fdf4ff; }
    .pb-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px)); }
    .hide-scrollbar::-webkit-scrollbar{display:none} .hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .35s ease-out forwards}
    input:focus,select:focus{outline:none;border-color:#a855f7}
    html, body { height: 100%; height: 100dvh; width: 100%; }
    body { margin: 0; padding: 0; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden">
<div class="h-full w-full max-w-md mx-auto bg-white shadow-2xl relative flex flex-col">

  <div class="flex-shrink-0 pt-12 pb-4 px-5 bg-white border-b border-gray-100">
    <h1 class="text-2xl font-black text-gray-900">👤 โปรไฟล์</h1>
  </div>

  <div class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-5 pb-4">

    <!-- Profile card -->
    <div class="bg-gradient-to-br from-violet-500 to-purple-600 rounded-3xl p-5 text-white mb-5 shadow-xl">
      <div class="flex items-center gap-4">
        <div id="avatarDisplay"
             class="w-20 h-20 rounded-2xl bg-white/20 flex items-center justify-center text-4xl overflow-hidden flex-shrink-0 cursor-pointer border-2 border-white/30"
             onclick="document.getElementById('avatarInput').click()">
          <span id="avatarEmoji">👦🏻</span>
        </div>
        <input id="avatarInput" type="file" accept="image/*" class="hidden" onchange="onAvatarSelected(event)">
        <div class="flex-1 min-w-0">
          <p id="profileName" class="text-xl font-black truncate">กำลังโหลด…</p>
          <p id="profilePhone" class="text-xs opacity-75 truncate">–</p>
          <div class="flex items-center gap-2 mt-2">
            <div class="bg-white/20 rounded-full px-2.5 py-1 flex items-center gap-1">
              <span class="text-xs">🪙</span>
              <span id="walletPoints" class="font-black text-xs">0</span>
            </div>
            <div class="bg-white/20 rounded-full px-2.5 py-1 flex items-center gap-1">
              <span class="text-xs">⭐</span>
              <span id="totalPoints" class="font-black text-xs">0</span>
            </div>
          </div>
        </div>
      </div>
      <p class="text-xs opacity-60 mt-3">แตะรูปโปรไฟล์เพื่อเปลี่ยน</p>
    </div>

    <!-- ข้อมูลส่วนตัว -->
    <div class="bg-white border border-gray-100 rounded-3xl p-4 shadow-sm mb-5">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-black text-gray-800">📋 ข้อมูลส่วนตัว</h3>
        <span id="bmiBadge" class="hidden text-xs font-black px-3 py-1 rounded-full"></span>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-violet-50 rounded-2xl p-3">
          <p class="text-[10px] text-violet-400 font-bold">🎂 วันเกิด</p>
          <p id="infoBirthDate" class="font-black text-gray-800 text-sm mt-1">–</p>
          <p id="infoAge" class="text-[10px] text-gray-400">–</p>
        </div>
        <div class="bg-sky-50 rounded-2xl p-3">
          <p class="text-[10px] text-sky-400 font-bold">📏 ส่วนสูง</p>
          <p id="infoHeight" class="font-black text-gray-800 text-sm mt-1">–</p>
        </div>
        <div class="bg-amber-50 rounded-2xl p-3">
          <p class="text-[10px] text-amber-400 font-bold">⚖️ น้ำหนัก</p>
          <p id="infoWeight" class="font-black text-gray-800 text-sm mt-1">–</p>
        </div>
        <div class="bg-emerald-50 rounded-2xl p-3">
          <p class="text-[10px] text-emerald-400 font-bold">📊 BMI</p>
          <p id="infoBMI" class="font-black text-gray-800 text-sm mt-1">–</p>
          <p id="infoBMILabel" class="text-[10px] text-gray-400">–</p>
        </div>
      </div>
    </div>

    <!-- Body Statistics Section -->
    <div class="bg-white border border-gray-100 rounded-3xl p-4 shadow-sm mb-5">
      <div class="flex items-center justify-between mb-4 cursor-pointer" onclick="toggleBodyStats()">
        <h3 class="font-black text-gray-800">📊 บันทึกสถิติร่างกาย</h3>
        <span id="bodyStatsToggleIcon" class="text-xl transition-transform">▼</span>
      </div>
      <div id="bodyStatsContent" class="hidden">
        <div id="bodyStatsSummary" class="bg-gradient-to-r from-emerald-400 to-teal-500 rounded-2xl p-4 text-white mb-4 shadow-md">
          <p class="text-xs font-bold opacity-75 uppercase tracking-wider mb-2">สรุปล่าสุด</p>
          <div class="grid grid-cols-2 gap-3">
            <div id="statsHeight" class="text-sm"><span class="opacity-75">ส่วนสูง:</span> <span class="font-black">–</span></div>
            <div id="statsWeight" class="text-sm"><span class="opacity-75">น้ำหนัก:</span> <span class="font-black">–</span></div>
            <div id="statsWaist" class="text-sm"><span class="opacity-75">เอว:</span> <span class="font-black">–</span></div>
            <div id="statsHip" class="text-sm"><span class="opacity-75">สะโพก:</span> <span class="font-black">–</span></div>
          </div>
        </div>
        <div class="space-y-3 mb-4 pb-4 border-b border-gray-100">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-400 font-bold uppercase">ส่วนสูง (cm)</label>
              <input id="bs_height" type="number" placeholder="170" step="0.1"
                class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
            </div>
            <div>
              <label class="text-xs text-gray-400 font-bold uppercase">น้ำหนัก (kg)</label>
              <input id="bs_weight" type="number" placeholder="65" step="0.1"
                class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-400 font-bold uppercase">รอบเอว (cm)</label>
              <input id="bs_waist" type="number" placeholder="80" step="0.1"
                class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
            </div>
            <div>
              <label class="text-xs text-gray-400 font-bold uppercase">รอบสะโพก (cm)</label>
              <input id="bs_hip" type="number" placeholder="95" step="0.1"
                class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
            </div>
          </div>
          <div class="pt-2 border-t border-gray-100 mt-3">
            <p class="text-xs font-bold text-gray-700 mb-2">🩸 ผลตรวจเลือด</p>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-xs text-gray-400 font-bold">กล้ามเนื้อ (%)</label>
                <input id="bs_muscle" type="number" placeholder="45" step="0.1"
                  class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
              </div>
              <div>
                <label class="text-xs text-gray-400 font-bold">ไขมันเลือด (mg/dL)</label>
                <input id="bs_bloodfat" type="number" placeholder="180" step="0.1"
                  class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
              </div>
              <div>
                <label class="text-xs text-gray-400 font-bold">น้ำตาล (mg/dL)</label>
                <input id="bs_bloodsugar" type="number" placeholder="100" step="0.1"
                  class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
              </div>
              <div>
                <label class="text-xs text-gray-400 font-bold">ความดัน (mmHg)</label>
                <input id="bs_bloodpressure" type="text" placeholder="120/80"
                  class="mt-1 w-full border border-gray-200 rounded-2xl px-4 py-2.5 text-sm font-bold transition-colors">
              </div>
            </div>
          </div>
        </div>
        <button onclick="saveBodyStats()"
          class="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-white font-black py-3 rounded-2xl text-sm active:scale-95 transition shadow-md">
          💾 บันทึกสถิติร่างกาย
        </button>
      </div>
    </div>

    <button onclick="logout()" class="w-full border-2 border-gray-200 text-gray-500 font-black py-3 rounded-2xl text-sm active:scale-95 transition mb-4">
      🚪 ออกจากระบบ
    </button>
  </div>

  <!-- Responsive nav -->
  <nav class="flex-shrink-0 w-full bg-white/95 backdrop-blur border-t border-gray-100 flex items-center justify-around pb-safe z-50 shadow-2xl" style="min-height:calc(3.5rem + max(0.5rem, env(safe-area-inset-bottom, 0px)))">
    <a href="food.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center"><span class="text-xl">🍱</span><span class="text-[10px] font-bold">อาหาร</span></a>
    <a href="reminders.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center"><span class="text-xl">⏰</span><span class="text-[10px] font-bold">เตือน</span></a>
    <a href="missions.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center"><span class="text-xl">🏆</span><span class="text-[10px] font-bold">ภารกิจ</span></a>
    <a href="profile.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-violet-500 flex-1 justify-center"><span class="text-xl">👤</span><span class="text-[10px] font-bold">โปรไฟล์</span></a>
  </nav>
</div>

<script type="module">
  import { requireAuth, clearSession, saveSession } from '../lib/auth.js';
  import { db } from '../lib/firebase.js';
  import {
    doc, getDoc, updateDoc,
    collection, getDocs, addDoc, query, where, orderBy, onSnapshot, runTransaction
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getAuth, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import { auth } from '../lib/firebase.js';

  const session = requireAuth();
  if (!session) await new Promise(() => {});
  const uid = session.uid;

  // ค.ศ. → พ.ศ.
  function toBE(ceStr) {
    if (!ceStr) return '–';
    const p = ceStr.split('-');
    if (p.length !== 3) return ceStr;
    return `${parseInt(p[2])}/${parseInt(p[1])}/${parseInt(p[0]) + 543}`;
  }

  // คำนวณอายุ
  function calcAge(birthDateStr) {
    if (!birthDateStr) return null;
    const b = new Date(birthDateStr);
    const n = new Date();
    let age = n.getFullYear() - b.getFullYear();
    const m = n.getMonth() - b.getMonth();
    if (m < 0 || (m === 0 && n.getDate() < b.getDate())) age--;
    return age;
  }

  // คำนวณ BMI + label
  function calcBMI(w, h) {
    if (!w || !h || h <= 0) return null;
    const bmi = w / ((h / 100) ** 2);
    let label = '';
    if (bmi < 18.5) label = 'น้ำหนักน้อย';
    else if (bmi < 23) label = 'ปกติ';
    else if (bmi < 25) label = 'เกินเกณฑ์';
    else if (bmi < 30) label = 'อ้วน';
    else label = 'อ้วนมาก';
    return { value: bmi.toFixed(1), label };
  }

  // โหลดข้อมูล user — แสดงเท่านั้น ไม่มีฟอร์มแก้ไข
  onSnapshot(doc(db, 'users', uid), snap => {
    const d = snap.data() || {};

    document.getElementById('profileName').textContent = d.displayName || session.displayName || '–';
    document.getElementById('profilePhone').textContent = d.phone ? `📱 ${d.phone}` : '–';
    document.getElementById('walletPoints').textContent = (d.wallet || 0).toLocaleString();
    document.getElementById('totalPoints').textContent = (d.wallet || 0).toLocaleString();
    document.getElementById('walletDisplay').textContent = (d.wallet || 0).toLocaleString();

    // ข้อมูลส่วนตัว
    document.getElementById('infoBirthDate').textContent = toBE(d.birthDate);
    const age = calcAge(d.birthDate);
    document.getElementById('infoAge').textContent = age !== null ? `อายุ ${age} ปี` : '–';
    document.getElementById('infoHeight').textContent = d.initialHeight ? `${d.initialHeight} cm` : '–';
    document.getElementById('infoWeight').textContent = d.initialWeight ? `${d.initialWeight} kg` : '–';

    const bmi = calcBMI(d.initialWeight, d.initialHeight);
    if (bmi) {
      document.getElementById('infoBMI').textContent = bmi.value;
      document.getElementById('infoBMILabel').textContent = bmi.label;
      const badge = document.getElementById('bmiBadge');
      badge.classList.remove('hidden');
      badge.textContent = `BMI ${bmi.value}`;
      if (bmi.value < 18.5) badge.className = 'text-xs font-black px-3 py-1 rounded-full bg-blue-100 text-blue-600';
      else if (bmi.value < 23) badge.className = 'text-xs font-black px-3 py-1 rounded-full bg-emerald-100 text-emerald-600';
      else if (bmi.value < 25) badge.className = 'text-xs font-black px-3 py-1 rounded-full bg-yellow-100 text-yellow-600';
      else badge.className = 'text-xs font-black px-3 py-1 rounded-full bg-red-100 text-red-600';
    } else {
      document.getElementById('infoBMI').textContent = '–';
      document.getElementById('infoBMILabel').textContent = '–';
      document.getElementById('bmiBadge').classList.add('hidden');
    }

    // Avatar
    const av = d.avatar || '';
    const disp = document.getElementById('avatarDisplay');
    if (av.startsWith('http') || av.startsWith('data:')) {
      disp.innerHTML = `<img src="${av}" class="w-full h-full object-cover">`;
    } else {
      disp.innerHTML = `<span>${av || '👦🏻'}</span>`;
    }
  });

  // เปลี่ยนรูปอวตาร์
  window.onAvatarSelected = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      await updateDoc(doc(db, 'users', uid), { avatar: ev.target.result });
      saveSession({ ...session, avatar: ev.target.result });
    };
    reader.readAsDataURL(file);
  };

  // Body Statistics toggle
  window.toggleBodyStats = () => {
    const c = document.getElementById('bodyStatsContent');
    const i = document.getElementById('bodyStatsToggleIcon');
    c.classList.toggle('hidden');
    i.style.transform = c.classList.contains('hidden') ? '' : 'rotate(180deg)';
  };

  window.saveBodyStats = async () => {
    const data = {
      height: parseFloat(document.getElementById('bs_height').value) || null,
      weight: parseFloat(document.getElementById('bs_weight').value) || null,
      waist: parseFloat(document.getElementById('bs_waist').value) || null,
      hip: parseFloat(document.getElementById('bs_hip').value) || null,
      muscle: parseFloat(document.getElementById('bs_muscle').value) || null,
      bloodfat: parseFloat(document.getElementById('bs_bloodfat').value) || null,
      bloodsugar: parseFloat(document.getElementById('bs_bloodsugar').value) || null,
      bloodpressure: document.getElementById('bs_bloodpressure').value.trim() || null,
      createdAt: new Date().toISOString(), uid
    };
    const hasData = Object.values(data).some(v => v !== null && v !== uid);
    if (!hasData) return alert('กรุณากรอกข้อมูลอย่างน้อยหนึ่งฟิลด์');
    try {
      await addDoc(collection(db, 'bodyStats'), data);
      alert('✅ บันทึกสถิติร่างกายสำเร็จ');
      loadBodyStats();
      ['bs_height','bs_weight','bs_waist','bs_hip','bs_muscle','bs_bloodfat','bs_bloodsugar','bs_bloodpressure'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    } catch (err) { alert('บันทึกไม่สำเร็จ: ' + err.message); }
  };

  async function loadBodyStats() {
    try {
      const q = query(collection(db, 'bodyStats'), where('uid', '==', uid), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      let l = null;
      if (!snap.empty) {
        l = snap.docs[0].data();
      } else {
        // Fallback: ดึงจาก users.initialHeight / initialWeight สำหรับสมาชิกใหม่
        const userSnap = await getDoc(doc(db, 'users', uid));
        const u = userSnap.data() || {};
        if (u.initialHeight || u.initialWeight) {
          l = { height: u.initialHeight || null, weight: u.initialWeight || null };
        }
      }
      if (l) {
        const set = (id, val, unit) => {
          document.getElementById(id).innerHTML = val
            ? `<span class="opacity-75">${id.replace('stats','')}:</span> <span class="font-black">${val} ${unit}</span>`
            : `<span class="opacity-75">${id.replace('stats','')}:</span> <span class="font-black">–</span>`;
        };
        set('statsHeight', l.height, 'cm');
        set('statsWeight', l.weight, 'kg');
        set('statsWaist', l.waist, 'cm');
        set('statsHip', l.hip, 'cm');
        if (l.height) document.getElementById('bs_height').value = l.height;
        if (l.weight) document.getElementById('bs_weight').value = l.weight;
        if (l.waist)  document.getElementById('bs_waist').value = l.waist;
        if (l.hip)    document.getElementById('bs_hip').value = l.hip;
        if (l.muscle)        document.getElementById('bs_muscle').value = l.muscle;
        if (l.bloodfat)      document.getElementById('bs_bloodfat').value = l.bloodfat;
        if (l.bloodsugar)    document.getElementById('bs_bloodsugar').value = l.bloodsugar;
        if (l.bloodpressure) document.getElementById('bs_bloodpressure').value = l.bloodpressure;
      }
    } catch (err) { console.error('Body stats error:', err); }
  }

  window.logout = async () => {
    if (!confirm('ออกจากระบบ?')) return;
    await signOut(auth); clearSession(); window.location.href = '/login.html';
  };

  loadBodyStats();
</script>
</body>
</html>
