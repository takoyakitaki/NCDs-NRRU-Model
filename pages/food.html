<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>บันทึกอาหาร</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family:'Prompt',sans-serif; -webkit-tap-highlight-color:transparent; }
    body { background:#f0fdf4; }
    .pb-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px)); }
    .hide-scrollbar::-webkit-scrollbar{display:none} .hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .4s ease-out forwards}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .analyzing{animation:pulse 1s ease-in-out infinite}
    html, body { height: 100%; height: 100dvh; width: 100%; }
    body { margin: 0; padding: 0; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden">
<div id="app" class="h-full w-full max-w-md mx-auto bg-white shadow-2xl relative flex flex-col">

  <!-- Header -->
  <div class="flex-shrink-0 pt-12 pb-4 px-5 bg-white border-b border-gray-100">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-black text-gray-900">🍱 บันทึกการรับประทานอาหาร</h1>
      </div>
      <div id="userAvatar" class="w-10 h-10 rounded-full bg-teal-100 flex items-center justify-center text-xl cursor-pointer"></div>
    </div>

    <!-- Calorie summary bar -->
    <div class="mt-4 bg-gradient-to-r from-teal-500 to-emerald-500 rounded-2xl p-4 text-white relative">
      <div class="absolute top-3 right-3 flex gap-1">
        <button onclick="editCalorieGoal()" class="bg-white/20 hover:bg-white/30 rounded-full px-2 py-1 text-[10px] font-black">Goal</button>
        <button onclick="openCalorieHistory()" class="bg-white/20 hover:bg-white/30 rounded-full px-2 py-1 text-[10px] font-black">History</button>
      </div>
      <div class="flex justify-between items-end mb-2">
        <div>
          <p class="text-xs font-bold opacity-75 uppercase tracking-wider">แคลอรี่วันนี้</p>
          <p class="text-3xl font-black" id="todayCalories">0</p>
        </div>
        <div class="text-right">
          <p class="text-lg font-bold" id="calorieGoal">2,000 kcal</p>
        </div>
      </div>
      <div class="w-full bg-white/30 rounded-full h-2">
        <div id="calorieBar" class="bg-white rounded-full h-2 transition-all duration-500" style="width:0%"></div>
      </div>
      <p id="calorieAlert" class="hidden mt-2 text-xs font-bold bg-white/20 rounded-xl px-3 py-2"></p>
    </div>
  </div>

  <!-- Scroll area -->
  <div class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-5 pb-4" id="scrollArea">

    <!-- ✅ ปุ่มเดียว — เต็มจอ โดดเด่น -->
    <button onclick="openCamera()"
      class="w-full flex items-center gap-4 bg-gradient-to-br from-teal-400 to-emerald-500 rounded-3xl p-5 text-white shadow-lg active:scale-[0.98] transition mb-6">
      <div class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center text-4xl flex-shrink-0">📷</div>
      <div class="text-left flex-1">
        <span class="font-black text-lg block">ถ่ายรูปอาหาร</span>
        <span class="text-sm opacity-75">Gemini จะวิเคราะห์แคลอรีและสารอาหารให้</span>
      </div>
      <span class="text-2xl opacity-50 flex-shrink-0">›</span>
    </button>

    <!-- Meal sections -->
    <div id="mealSections" class="space-y-4"></div>

  </div>

  <!-- Responsive nav -->
  <nav class="flex-shrink-0 w-full bg-white/95 backdrop-blur border-t border-gray-100 flex items-center justify-around pb-safe z-50 shadow-2xl" style="min-height:calc(3.5rem + max(0.5rem, env(safe-area-inset-bottom, 0px)))">
    <a href="food.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-teal-500 flex-1 justify-center"><span class="text-xl">🍱</span><span class="text-[10px] font-bold">อาหาร</span></a>
    <a href="reminders.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center"><span class="text-xl">⏰</span><span class="text-[10px] font-bold">เตือน</span></a>
    <a href="missions.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center"><span class="text-xl">🏆</span><span class="text-[10px] font-bold">ภารกิจ</span></a>
    <a href="profile.html" class="flex flex-col items-center py-2 px-2 gap-0.5 text-gray-400 flex-1 justify-center"><span class="text-xl">👤</span><span class="text-[10px] font-bold">โปรไฟล์</span></a>
  </nav>
</div>

<!-- Camera / Analyze Modal -->
<div id="cameraModal" class="hidden fixed inset-0 bg-black/80 z-50 flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-3xl overflow-hidden shadow-2xl max-h-[92vh] flex flex-col">
    <div class="bg-gradient-to-r from-teal-500 to-emerald-500 p-4 flex items-center gap-3 flex-shrink-0">
      <button onclick="closeCameraModal()" class="text-white/70 hover:text-white text-xl">✕</button>
      <h2 class="text-white font-black text-lg flex-1 text-center">ถ่ายหรืออัปโหลดรูปอาหาร</h2>
    </div>

    <div class="flex-1 overflow-y-auto hide-scrollbar">
      <!-- Upload zone -->
      <div id="uploadZone" class="m-4 border-2 border-dashed border-teal-300 rounded-2xl p-6 text-center cursor-pointer"
           onclick="document.getElementById('fileInput').click()">
        <span class="text-5xl">📷</span>
        <p class="text-gray-500 font-semibold mt-2 text-sm">แตะเพื่อถ่ายรูป / เลือกรูป</p>
      </div>
      <img id="previewImg" class="hidden w-full max-h-64 object-contain px-4" />
      <input id="fileInput" type="file" accept="image/*" capture="environment" class="hidden" onchange="onFileSelected(event)">

      <!-- Meal type -->
      <div class="px-4 pb-2">
        <p class="text-xs text-gray-500 font-bold mb-2">มื้ออาหาร</p>
        <div class="flex gap-2">
          <button data-meal="เช้า"    onclick="selectMeal(this)" class="meal-btn flex-1 py-2 rounded-xl text-xs font-bold border-2 border-teal-400 bg-teal-50 text-teal-600">🌅 เช้า</button>
          <button data-meal="กลางวัน" onclick="selectMeal(this)" class="meal-btn flex-1 py-2 rounded-xl text-xs font-bold border-2 border-gray-200 text-gray-500">☀️ กลาง</button>
          <button data-meal="เย็น"    onclick="selectMeal(this)" class="meal-btn flex-1 py-2 rounded-xl text-xs font-bold border-2 border-gray-200 text-gray-500">🌙 เย็น</button>
          <button data-meal="ว่าง"    onclick="selectMeal(this)" class="meal-btn flex-1 py-2 rounded-xl text-xs font-bold border-2 border-gray-200 text-gray-500">🍎 ว่าง</button>
        </div>
      </div>

      <!-- Status -->
      <div id="analyzeStatus" class="hidden px-4 py-3 mx-4 mb-2 rounded-2xl bg-teal-50 text-teal-700 text-sm font-semibold text-center"></div>

      <!-- Result -->
      <div id="analyzeResult" class="hidden px-4 pb-2 space-y-2">
        <div class="bg-gray-50 rounded-2xl p-3">
          <p class="text-xs text-gray-400 font-bold mb-1">ชื่ออาหาร (แก้ไขได้)</p>
          <input id="foodName" class="w-full bg-transparent font-bold text-gray-800 text-sm outline-none border-b border-gray-200 pb-1">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div class="bg-orange-50 rounded-2xl p-3 text-center">
            <p class="text-[10px] text-orange-400 font-bold mb-1">แคลอรี่</p>
            <input id="foodCalories" type="number" class="w-full bg-transparent font-black text-orange-600 text-xl text-center outline-none">
            <p class="text-[10px] text-orange-400">kcal</p>
          </div>
          <div class="bg-blue-50 rounded-2xl p-3 text-center">
            <p class="text-[10px] text-blue-400 font-bold mb-1">โปรตีน</p>
            <input id="foodProtein" type="number" class="w-full bg-transparent font-black text-blue-600 text-xl text-center outline-none">
            <p class="text-[10px] text-blue-400">g</p>
          </div>
        </div>
        <div class="grid grid-cols-4 gap-2">
          <div class="bg-emerald-50 rounded-2xl p-2 text-center">
            <p class="text-[10px] text-emerald-500 font-bold mb-1">Carb</p>
            <input id="foodCarbs" type="number" class="w-full bg-transparent font-black text-emerald-600 text-sm text-center outline-none">
            <p class="text-[10px] text-emerald-400">g</p>
          </div>
          <div class="bg-amber-50 rounded-2xl p-2 text-center">
            <p class="text-[10px] text-amber-500 font-bold mb-1">Fat</p>
            <input id="foodFat" type="number" class="w-full bg-transparent font-black text-amber-600 text-sm text-center outline-none">
            <p class="text-[10px] text-amber-400">g</p>
          </div>
          <div class="bg-lime-50 rounded-2xl p-2 text-center">
            <p class="text-[10px] text-lime-500 font-bold mb-1">Fiber</p>
            <input id="foodFiber" type="number" class="w-full bg-transparent font-black text-lime-600 text-sm text-center outline-none">
            <p class="text-[10px] text-lime-400">g</p>
          </div>
          <div class="bg-rose-50 rounded-2xl p-2 text-center">
            <p class="text-[10px] text-rose-500 font-bold mb-1">Na</p>
            <input id="foodSodium" type="number" class="w-full bg-transparent font-black text-rose-600 text-sm text-center outline-none">
            <p class="text-[10px] text-rose-400">mg</p>
          </div>
        </div>
        <p id="foodNote" class="text-xs text-gray-400 italic px-1"></p>
      </div>
    </div>

    <!-- ปุ่มด้านล่าง modal -->
    <div class="p-4 flex gap-2 flex-shrink-0 pb-safe">
      <button id="analyzeBtn" onclick="analyzeFood()" disabled
        class="flex-1 bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-black py-3 rounded-2xl text-sm disabled:opacity-40 transition active:scale-95">
        🔍 วิเคราะห์
      </button>
      <button id="saveBtn" onclick="saveFoodEntry()" class="hidden flex-1 bg-gradient-to-r from-emerald-400 to-green-500 text-white font-black py-3 rounded-2xl text-sm active:scale-95">
        💾 บันทึก
      </button>
    </div>
  </div>
</div>

<!-- Calorie History Modal -->
<div id="calorieHistoryModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm max-h-[88vh] bg-white rounded-3xl overflow-hidden shadow-2xl flex flex-col">
    <div class="bg-gradient-to-r from-teal-500 to-emerald-500 p-4 flex items-center gap-3 flex-shrink-0">
      <button onclick="closeCalorieHistory()" class="text-white/70 hover:text-white text-xl">✕</button>
      <h2 class="text-white font-black text-lg flex-1 text-center">ประวัติแคลอรี่</h2>
    </div>
    <div class="p-4 flex-1 overflow-y-auto hide-scrollbar">
      <div class="flex items-center gap-2 mb-3">
        <input id="historyDatePicker" type="date" onchange="renderHistoryDay(this.value)"
          class="flex-1 border border-gray-200 rounded-2xl px-3 py-2 text-sm font-bold">
        <button onclick="loadCalorieHistory()" class="bg-teal-50 text-teal-600 rounded-2xl px-3 py-2 text-xs font-black">Reload</button>
      </div>
      <div id="calorieHistoryDays" class="space-y-2 mb-4"></div>
      <div id="calorieHistoryEntries" class="space-y-2"></div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '../lib/auth.js';
  import { db } from '../lib/firebase.js';
  import {
    collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc, getDocs, getDoc, setDoc
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const session = requireAuth();
  if (!session) await new Promise(() => {});

  const uid = session.uid;

  const av = session.avatar || '';
  const avatarEl = document.getElementById('userAvatar');
  if (av.startsWith('http') || av.startsWith('data:')) {
    avatarEl.innerHTML = `<img src="${av}" class="w-full h-full object-cover rounded-full">`;
  } else {
    avatarEl.textContent = av || '👦🏻';
  }

  let selectedMeal = 'เช้า';
  let selectedFile = null;
  let selectedB64 = null;
  let calorieGoal = 2000;
  let lineUserId = session.lineUid || null;
  let latestTodayEntries = [];
  let historyEntries = [];

  onSnapshot(doc(db, 'users', uid), snap => {
    const profile = snap.data() || {};
    calorieGoal = Number(profile.calorieGoal) || 2000;
    lineUserId = profile.lineUserId || profile.lineUid || session.lineUid || null;
    document.getElementById('calorieGoal').textContent = `${calorieGoal.toLocaleString()} kcal`;
    updateSummary(latestTodayEntries);
  }, err => console.error('User profile listener failed:', err));

  const today = formatLocalDate(new Date());
  const q = query(collection(db, 'foodLogs'), where('uid', '==', uid), where('date', '==', today));
  onSnapshot(q, snap => {
    const entries = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
    latestTodayEntries = entries;
    renderMeals(entries);
    updateSummary(entries);
  }, err => {
    console.error('Food log listener failed:', err);
    document.getElementById('mealSections').innerHTML =
      `<div class="text-center text-red-400 py-8 font-bold text-sm">โหลดประวัติอาหารไม่สำเร็จ: ${err.message}</div>`;
  });

  function updateSummary(entries) {
    const total = entries.reduce((s, e) => s + (e.calories || 0), 0);
    document.getElementById('todayCalories').textContent = total.toLocaleString();
    const pct = Math.min(100, (total / calorieGoal) * 100);
    document.getElementById('calorieBar').style.width = pct + '%';
    const alertEl = document.getElementById('calorieAlert');
    if (total >= calorieGoal && calorieGoal > 0) {
      alertEl.textContent = 'แคลอรี่วันนี้เต็มแล้ว';
      alertEl.classList.remove('hidden');
      notifyCalorieGoalReached(total);
    } else {
      alertEl.classList.add('hidden');
    }
    saveDailyCalorieSummary(total);
  }

  async function saveDailyCalorieSummary(total) {
    try {
      await setDoc(doc(db, 'dailyCalorieSummaries', `${uid}_${today}`), {
        uid, date: today, calories: total, goal: calorieGoal, updatedAt: new Date().toISOString()
      }, { merge: true });
    } catch (err) { console.warn('Daily summary save failed:', err); }
  }

  async function notifyCalorieGoalReached(total) {
    const notifyRef = doc(db, 'calorieNotifications', `${uid}_${today}`);
    try {
      const notifySnap = await getDoc(notifyRef);
      if (notifySnap.exists()) return;
      await setDoc(notifyRef, { uid, date: today, calories: total, goal: calorieGoal, status: lineUserId ? 'pending' : 'no_line_user', createdAt: new Date().toISOString() });
      if (!lineUserId) return;
      const res = await fetch('/api/send-line-message', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: lineUserId, text: `VitalVibe: แคลอรี่วันนี้เต็มแล้ว (${total.toLocaleString()} / ${calorieGoal.toLocaleString()} kcal)` }) });
      await updateDoc(notifyRef, { status: res.ok ? 'sent' : 'failed', notifiedAt: new Date().toISOString() });
    } catch (err) {
      console.warn('Calorie LINE notification failed:', err);
      try { await setDoc(notifyRef, { status: 'failed', error: err.message, updatedAt: new Date().toISOString() }, { merge: true }); } catch (_) {}
    }
  }

  function renderMeals(entries) {
    const meals = ['เช้า', 'กลางวัน', 'เย็น', 'ว่าง'];
    const icons = { เช้า: '🌅', กลางวัน: '☀️', เย็น: '🌙', ว่าง: '🍎' };
    let html = '';
    meals.forEach(m => {
      const items = entries.filter(e => e.meal === m);
      if (!items.length) return;
      const subtotal = items.reduce((s, e) => s + (e.calories || 0), 0);
      html += `<div class="fade-in">
        <div class="flex justify-between items-center mb-2">
          <h3 class="font-black text-gray-700">${icons[m]} มื้อ${m}</h3>
          <span class="text-xs font-bold text-teal-600 bg-teal-50 px-3 py-1 rounded-full">${subtotal} kcal</span>
        </div>
        <div class="space-y-2">`;
      items.forEach(e => {
        html += `<div class="bg-white border border-gray-100 rounded-2xl p-3 flex items-center gap-3 shadow-sm">
          <div class="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center text-lg flex-shrink-0">🍽️</div>
          <div class="flex-1 min-w-0">
            <p class="font-bold text-gray-800 text-sm truncate">${e.name}</p>
            <p class="text-xs text-gray-400">${e.calories || 0} kcal${e.protein ? ` · ${e.protein}g โปรตีน` : ''}</p>
            <p class="text-[11px] text-gray-300">C ${e.carbs || 0}g · F ${e.fat || 0}g · Fiber ${e.fiber || 0}g · Na ${e.sodium || 0}mg</p>
            ${e.note ? `<p class="text-[11px] text-gray-400 truncate">${e.note}</p>` : ''}
          </div>
          <button onclick="editEntry('${e.id}','${encodeURIComponent(e.name || '')}',${e.calories || 0},${e.carbs || 0},${e.protein || 0},${e.fat || 0},${e.fiber || 0},${e.sodium || 0},'${encodeURIComponent(e.note || '')}')" class="text-gray-300 hover:text-teal-500 transition text-sm font-black flex-shrink-0">แก้</button>
          <button onclick="deleteEntry('${e.id}')" class="text-gray-300 hover:text-red-400 transition text-lg flex-shrink-0">🗑</button>
        </div>`;
      });
      html += `</div></div>`;
    });
    if (!html) html = `<div class="text-center text-gray-300 py-12">
      <p class="text-5xl mb-3">🍽️</p>
      <p class="font-bold text-gray-400">ยังไม่มีรายการอาหารวันนี้</p>
      <p class="text-sm text-gray-300 mt-1">ถ่ายรูปอาหารเพื่อเริ่มบันทึก</p>
    </div>`;
    document.getElementById('mealSections').innerHTML = html;
  }

  window.deleteEntry = async (id) => {
    if (!confirm('ลบรายการนี้?')) return;
    try { await deleteDoc(doc(db, 'foodLogs', id)); } catch (err) { alert('ลบไม่สำเร็จ: ' + err.message); }
  };

  window.editEntry = async (id, encodedName, calories, carbs, protein, fat, fiber, sodium, encodedNote) => {
    const name = prompt('ชื่ออาหาร', decodeURIComponent(encodedName));
    if (name === null) return;
    const calInput = prompt('แคลอรี่ (kcal)', calories);
    if (calInput === null) return;
    const proteinInput = prompt('โปรตีน (g)', protein);
    if (proteinInput === null) return;
    const carbsInput = prompt('คาร์โบไฮเดรต (g)', carbs);
    if (carbsInput === null) return;
    const fatInput = prompt('ไขมัน (g)', fat);
    if (fatInput === null) return;
    const fiberInput = prompt('ใยอาหาร (g)', fiber);
    if (fiberInput === null) return;
    const sodiumInput = prompt('โซเดียม (mg)', sodium);
    if (sodiumInput === null) return;
    const note = prompt('หมายเหตุ', decodeURIComponent(encodedNote));
    if (note === null) return;
    try {
      await updateDoc(doc(db, 'foodLogs', id), {
        name: name.trim() || 'ไม่ระบุชื่อ',
        calories: Math.max(0, parseInt(calInput) || 0),
        carbs: Math.max(0, parseInt(carbsInput) || 0),
        protein: Math.max(0, parseInt(proteinInput) || 0),
        fat: Math.max(0, parseInt(fatInput) || 0),
        fiber: Math.max(0, parseInt(fiberInput) || 0),
        sodium: Math.max(0, parseInt(sodiumInput) || 0),
        note: note.trim(), updatedAt: new Date().toISOString()
      });
    } catch (err) { alert('แก้ไขไม่สำเร็จ: ' + err.message); }
  };

  // Camera modal
  window.openCamera = () => {
    document.getElementById('cameraModal').classList.remove('hidden');
    document.getElementById('previewImg').classList.add('hidden');
    document.getElementById('uploadZone').classList.remove('hidden');
    document.getElementById('analyzeResult').classList.add('hidden');
    document.getElementById('analyzeStatus').classList.add('hidden');
    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('saveBtn').classList.add('hidden');
    selectedFile = null; selectedB64 = null;
  };
  window.closeCameraModal = () => document.getElementById('cameraModal').classList.add('hidden');

  window.selectMeal = (btn) => {
    selectedMeal = btn.dataset.meal;
    document.querySelectorAll('.meal-btn').forEach(b => {
      b.className = b === btn
        ? 'meal-btn flex-1 py-2 rounded-xl text-xs font-bold border-2 border-teal-400 bg-teal-50 text-teal-600'
        : 'meal-btn flex-1 py-2 rounded-xl text-xs font-bold border-2 border-gray-200 text-gray-500';
    });
  };

  window.onFileSelected = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    resizeImage(file).then(dataUrl => {
      selectedB64 = dataUrl.split(',')[1];
      const img = document.getElementById('previewImg');
      img.src = dataUrl;
      img.classList.remove('hidden');
      document.getElementById('uploadZone').classList.add('hidden');
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('analyzeResult').classList.add('hidden');
      document.getElementById('saveBtn').classList.add('hidden');
    }).catch(err => {
      alert('อ่านรูปไม่สำเร็จ: ' + err.message);
      selectedFile = null; selectedB64 = null;
    });
  };

  function resizeImage(file, maxSize = 1280, quality = 0.82) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Cannot read file'));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('Cannot load image'));
        img.onload = () => {
          const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  window.analyzeFood = async () => {
    if (!selectedB64) return;
    const btn = document.getElementById('analyzeBtn');
    const status = document.getElementById('analyzeStatus');
    btn.disabled = true;
    status.textContent = '🤖 Gemini กำลังวิเคราะห์อาหาร…';
    status.classList.remove('hidden');
    try {
      const res = await fetch('/api/analyze-food', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mimeType: 'image/jpeg', image: selectedB64 }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Analyze request failed');
      const parsed = data.food || {};
      document.getElementById('foodName').value = parsed.name || '';
      document.getElementById('foodCalories').value = parsed.calories || '';
      document.getElementById('foodCarbs').value = parsed.carbs || '';
      document.getElementById('foodProtein').value = parsed.protein || '';
      document.getElementById('foodFat').value = parsed.fat || '';
      document.getElementById('foodFiber').value = parsed.fiber || '';
      document.getElementById('foodSodium').value = parsed.sodium || '';
      document.getElementById('foodNote').textContent = parsed.note || '';
      document.getElementById('analyzeResult').classList.remove('hidden');
      document.getElementById('saveBtn').classList.remove('hidden');
      status.textContent = '✅ วิเคราะห์เสร็จแล้ว แก้ไขได้ก่อนบันทึก';
    } catch (err) {
      status.textContent = '❌ วิเคราะห์ไม่สำเร็จ: ' + err.message;
      btn.disabled = false;
    }
  };

  window.saveFoodEntry = async () => {
    const name = document.getElementById('foodName').value.trim();
    const calories = Math.max(0, parseInt(document.getElementById('foodCalories').value) || 0);
    const carbs = Math.max(0, parseInt(document.getElementById('foodCarbs').value) || 0);
    const protein = Math.max(0, parseInt(document.getElementById('foodProtein').value) || 0);
    const fat = Math.max(0, parseInt(document.getElementById('foodFat').value) || 0);
    const fiber = Math.max(0, parseInt(document.getElementById('foodFiber').value) || 0);
    const sodium = Math.max(0, parseInt(document.getElementById('foodSodium').value) || 0);
    const note = document.getElementById('foodNote').textContent.trim();
    if (!name) return alert('กรุณาระบุชื่ออาหาร');
    try {
      await addDoc(collection(db, 'foodLogs'), { uid, name, calories, carbs, protein, fat, fiber, sodium, note, meal: selectedMeal, source: 'ai', analyzedBy: 'gemini', date: today, createdAt: new Date().toISOString() });
      closeCameraModal();
    } catch (err) { alert('บันทึกอาหารไม่สำเร็จ: ' + err.message); }
  };

  window.editCalorieGoal = async () => {
    const next = prompt('เป้าหมายแคลอรี่ต่อวัน (kcal)', calorieGoal);
    if (next === null) return;
    const value = Math.max(1, parseInt(next) || 2000);
    try { await updateDoc(doc(db, 'users', uid), { calorieGoal: value }); } catch (err) { alert('บันทึกเป้าหมายไม่สำเร็จ: ' + err.message); }
  };

  window.openCalorieHistory = async () => {
    document.getElementById('calorieHistoryModal').classList.remove('hidden');
    document.getElementById('historyDatePicker').value = today;
    await loadCalorieHistory();
  };
  window.closeCalorieHistory = () => document.getElementById('calorieHistoryModal').classList.add('hidden');

  window.loadCalorieHistory = async () => {
    const snap = await getDocs(query(collection(db, 'foodLogs'), where('uid', '==', uid)));
    historyEntries = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')) || String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
    const byDate = new Map();
    historyEntries.forEach(e => {
      const date = e.date || (e.createdAt ? formatLocalDate(new Date(e.createdAt)) : today);
      const cur = byDate.get(date) || { date, calories: 0, count: 0 };
      cur.calories += Number(e.calories) || 0; cur.count += 1;
      byDate.set(date, cur);
    });
    const days = [...byDate.values()].sort((a, b) => b.date.localeCompare(a.date));
    document.getElementById('calorieHistoryDays').innerHTML = days.length
      ? days.map(day => `<button onclick="renderHistoryDay('${day.date}')" class="w-full border border-gray-100 rounded-2xl px-3 py-2 text-left flex items-center justify-between"><span class="font-black text-gray-700 text-sm">${day.date}</span><span class="text-xs font-bold text-teal-600">${day.calories.toLocaleString()} kcal · ${day.count} รายการ</span></button>`).join('')
      : '<p class="text-center text-gray-300 py-6 font-bold text-sm">ยังไม่มีประวัติแคลอรี่</p>';
    renderHistoryDay(document.getElementById('historyDatePicker').value || today);
  };

  window.renderHistoryDay = (date) => {
    document.getElementById('historyDatePicker').value = date;
    const entries = historyEntries.filter(e => (e.date || (e.createdAt ? formatLocalDate(new Date(e.createdAt)) : '')) === date);
    const total = entries.reduce((sum, e) => sum + (Number(e.calories) || 0), 0);
    document.getElementById('calorieHistoryEntries').innerHTML = entries.length
      ? `<div class="font-black text-gray-700 text-sm mb-2">รวม ${total.toLocaleString()} kcal</div>` + entries.map(e => `<div class="bg-white border border-gray-100 rounded-2xl p-3 flex items-center gap-3 shadow-sm"><div class="flex-1 min-w-0"><p class="font-bold text-gray-800 text-sm truncate">${e.name || 'ไม่ระบุชื่อ'}</p><p class="text-xs text-gray-400">${e.calories || 0} kcal · โปรตีน ${e.protein || 0}g · ${e.meal || '-'}</p></div><button onclick="editEntry('${e.id}','${encodeURIComponent(e.name || '')}',${e.calories || 0},${e.carbs || 0},${e.protein || 0},${e.fat || 0},${e.fiber || 0},${e.sodium || 0},'${encodeURIComponent(e.note || '')}')" class="text-teal-500 text-xs font-black">แก้</button></div>`).join('')
      : '<p class="text-center text-gray-300 py-6 font-bold text-sm">วันนี้ยังไม่มีรายการอาหาร</p>';
  };

  function formatLocalDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
</script>
