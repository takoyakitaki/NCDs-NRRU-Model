<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VitalVibe - LINE Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { fontSize: { '2xs': ['0.625rem', { lineHeight: '0.875rem' }] } } }
    }
  </script>
  <style>
    * { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #0d1117; }
    html { height: 100%; }
    body {
      height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .card-glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-primary {
      background: linear-gradient(135deg, #06c755, #14b8a6);
      transition: all .2s;
    }
    .btn-primary:active { transform: scale(0.97); opacity: .9; }
    .btn-primary:disabled { opacity: 0.4; pointer-events: none; }
    input:focus, select:focus { outline: none; border-color: #06c755; }
    @keyframes floatUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .float-up { animation: floatUp .5s ease-out forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .8s linear infinite; }
    .register-scroll {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      max-height: min(55dvh, 480px);
    }
    .register-scroll::-webkit-scrollbar { display: none; }
    .register-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    @supports (-webkit-touch-callout: none) {
      input[type="text"], input[type="tel"], input[type="email"], input[type="number"], input[type="date"] {
        font-size: 16px !important;
      }
    }
    .login-container { width: 100%; max-width: 28rem; }
    @media (min-width: 640px) { .login-container { max-width: 30rem; } }
    @media (min-width: 1024px) { .login-container { max-width: 32rem; } }
  </style>
</head>
<body class="flex items-center justify-center relative overflow-hidden">

  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute w-60 h-60 sm:w-80 sm:h-80 lg:w-96 lg:h-96 -top-20 sm:-top-32 lg:-top-40 -left-20 sm:-left-32 lg:-left-40 rounded-full opacity-20"
         style="background:radial-gradient(circle,#06c755,transparent)"></div>
    <div class="absolute w-60 h-60 sm:w-80 sm:h-80 lg:w-96 lg:h-96 -bottom-20 sm:-bottom-32 lg:-bottom-40 -right-20 sm:-right-32 lg:-right-40 rounded-full opacity-20"
         style="background:radial-gradient(circle,#14b8a6,transparent)"></div>
  </div>

  <div class="login-container float-up px-4 sm:px-6">
    <div class="text-center mb-4 sm:mb-6">
      <div id="avatarPreview"
           class="w-16 h-16 sm:w-20 sm:h-20 mx-auto rounded-2xl sm:rounded-3xl flex items-center justify-center text-2xl sm:text-4xl mb-2 sm:mb-3 shadow-2xl overflow-hidden"
           style="background:linear-gradient(135deg,#06c755,#14b8a6)">VV</div>
      <h1 class="text-2xl sm:text-3xl font-black text-white tracking-tight">VitalVibe</h1>
      <p id="subtitle" class="text-xs sm:text-sm text-emerald-400 font-semibold mt-1">Login with LINE</p>
    </div>

    <div class="card-glass rounded-2xl sm:rounded-3xl p-4 sm:p-6">

      <div id="statusView">
        <div class="text-center py-6 sm:py-8">
          <div class="w-10 h-10 sm:w-12 sm:h-12 border-4 border-white/20 border-t-emerald-400 rounded-full spinner mx-auto mb-3 sm:mb-4"></div>
          <p id="statusText" class="text-white font-bold text-xs sm:text-sm">กำลังเชื่อมต่อ LINE...</p>
          <p class="text-white/40 text-2xs sm:text-xs mt-2">กรุณาเปิดหน้านี้ภายในแอป LINE</p>
        </div>
      </div>

      <div id="registerView" class="hidden flex flex-col">
        <div class="mb-3 sm:mb-4 flex-shrink-0">
          <h2 class="text-white font-black text-lg sm:text-xl">📝 ลงทะเบียน</h2>
          <p class="text-white/45 text-2xs sm:text-xs mt-1">กรอกข้อมูลเพื่อเริ่มใช้งาน VitalVibe</p>
        </div>
        <div class="register-scroll space-y-2.5 sm:space-y-3 pr-1 flex-1">
          <div>
            <label class="text-2xs sm:text-xs text-white/45 font-bold">ชื่อ - นามสกุล <span class="text-emerald-400">*</span></label>
            <input id="regName" type="text" placeholder="เช่น สมชาย ใจดี"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-xl sm:rounded-2xl px-3 sm:px-4 py-2.5 sm:py-3 text-white placeholder-white/40 text-sm transition-colors">
          </div>
          <div>
            <label class="text-2xs sm:text-xs text-white/45 font-bold">เบอร์โทรศัพท์ <span class="text-emerald-400">*</span></label>
            <input id="regPhone" type="tel" placeholder="0812345678" maxlength="10" inputmode="numeric"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-xl sm:rounded-2xl px-3 sm:px-4 py-2.5 sm:py-3 text-white placeholder-white/40 text-sm transition-colors">
          </div>
          <div>
            <label class="text-2xs sm:text-xs text-white/45 font-bold">วันเดือนปีเกิด <span class="text-emerald-400">*</span></label>
            <input id="regBirthDate" type="date"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-xl sm:rounded-2xl px-3 sm:px-4 py-2.5 sm:py-3 text-white placeholder-white/40 text-sm transition-colors">
            <p id="birthDateHint" class="text-2xs sm:text-[10px] text-white/30 mt-1">เลือกวันเกิด (จะแสดงเป็น พ.ศ. อัตโนมัติ)</p>
          </div>
          <div class="grid gap-2.5 sm:gap-3" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr))">
            <div>
              <label class="text-2xs sm:text-xs text-white/45 font-bold">น้ำหนักปัจจุบัน (kg) <span class="text-emerald-400">*</span></label>
              <input id="regWeight" type="number" placeholder="65" step="0.1" min="20" max="300" inputmode="decimal"
                class="mt-1 w-full bg-white/10 border border-white/20 rounded-xl sm:rounded-2xl px-3 sm:px-4 py-2.5 sm:py-3 text-white placeholder-white/40 text-sm transition-colors">
            </div>
            <div>
              <label class="text-2xs sm:text-xs text-white/45 font-bold">ส่วนสูงปัจจุบัน (cm) <span class="text-emerald-400">*</span></label>
              <input id="regHeight" type="number" placeholder="170" step="0.1" min="50" max="250" inputmode="decimal"
                class="mt-1 w-full bg-white/10 border border-white/20 rounded-xl sm:rounded-2xl px-3 sm:px-4 py-2.5 sm:py-3 text-white placeholder-white/40 text-sm transition-colors">
            </div>
          </div>
          <div>
            <label class="text-2xs sm:text-xs text-white/45 font-bold">อีเมล (ไม่จำเป็น)</label>
            <input id="regEmail" type="email" placeholder="name@example.com" inputmode="email"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-xl sm:rounded-2xl px-3 sm:px-4 py-2.5 sm:py-3 text-white placeholder-white/40 text-sm transition-colors">
          </div>
          <div id="bmiPreview" class="hidden p-3 rounded-xl sm:rounded-2xl bg-white/10 text-center">
            <p class="text-white/60 text-2xs sm:text-xs">BMI ของคุณ</p>
            <p id="bmiValue" class="text-xl sm:text-2xl font-black text-emerald-400 mt-1">–</p>
            <p id="bmiLabel" class="text-2xs sm:text-xs text-white/50 mt-0.5">–</p>
          </div>
        </div>
        <button id="btnRegister" class="btn-primary w-full mt-3 sm:mt-4 py-3 sm:py-3.5 rounded-xl sm:rounded-2xl text-white font-black text-xs sm:text-sm shadow-lg flex-shrink-0">
          สร้างบัญชี
        </button>
      </div>

      <button id="btnLineLogin" class="hidden btn-primary w-full py-3 sm:py-3.5 rounded-xl sm:rounded-2xl text-white font-black text-xs sm:text-sm shadow-lg">
        เข้าสู่ระบบด้วย LINE
      </button>

      <div id="msgBox" class="hidden mt-3 sm:mt-4 p-2.5 sm:p-3 rounded-xl sm:rounded-2xl text-2xs sm:text-sm text-center font-semibold break-words"></div>
    </div>

    <p class="text-center text-white/30 text-2xs sm:text-xs mt-4 sm:mt-6 pb-2">VitalVibe for LINE Web App</p>
  </div>

  <script type="module">
    /* ════════════════════════════════════════════════════════════
       VitalVibe Login Flow (Refactored)
       
       Key change: REMOVED Anonymous Auth entirely.
       
       Why? Anonymous Auth creates a NEW UID every time a user logs in.
       This UID doesn't match the Firestore doc ID → data not found →
       "Missing or insufficient permissions" errors.
       
       New flow:
       1. LINE login → get lineProfile.userId
       2. Search Firestore for existing user doc (by lineUid field)
       3. If found → lineProfile.userId IS the doc ID (backward compatible)
       4. If new → show register form → save with doc ID = lineUserId
       5. Call Cloud Function generateLineAuthToken({ lineUid }) → Custom Token
       6. signInWithCustomToken → auth.currentUser.uid === Firestore doc ID
       7. ALL pages use auth.currentUser.uid as the stable identifier
       
       Benefits:
       - No anonymous auth → no UID mismatch
       - request.auth.uid is always set → Firestore rules work
       - Same UID every session → data always found
       - No vv_auth_mode / vv_firestore_uid needed
       ════════════════════════════════════════════════════════════ */
    const pathname = window.location.pathname;
    if (!pathname.endsWith('login.html') && !pathname.endsWith('/') && window.location.hostname !== 'localhost') {
      const params = new URLSearchParams(window.location.search);
      const redirectParam = params.get('redirect') || '';
      const correctUrl = redirectParam
        ? `/login.html?redirect=${encodeURIComponent(redirectParam)}`
        : '/login.html';
      window.location.replace(correctUrl);
      throw new Error('Redirecting');
    }

    // ── Imports ────────────────────────────────────────────
    let db, LIFF_IDS, auth;
    try {
      const m = await import('./lib/firebase.js');
      db = m.db; LIFF_IDS = m.LIFF_IDS; auth = m.auth;
    } catch (e) {
      document.getElementById('statusText').textContent = 'โหลด config ไม่สำเร็จ';
      showMsg('ไม่สามารถโหลดการตั้งค่าได้');
      throw e;
    }

    if (!LIFF_IDS?.login) {
      document.getElementById('statusText').textContent = 'การตั้งค่า LIFF ไม่ถูกต้อง';
      showMsg('LIFF_ID ไม่ถูกต้อง กรุณาตรวจไฟล์ lib/firebase.js');
      throw new Error('LIFF_IDS.login missing');
    }

    const { saveSession } = await import('./lib/auth.js');
    const { signInWithCustomToken } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
    const { collection, doc, getDoc, getDocs, query, setDoc, where, runTransaction, addDoc } =
      await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');

    /* ── Utility: APP_BASE_URL ─────────────────────────── */
    const APP_BASE_URL = window.location.origin + window.location.pathname;
    console.log('🔗 APP_BASE_URL:', APP_BASE_URL);

    /* ── Redirect handling ───────────────────────────── */
    const urlParams = new URLSearchParams(window.location.search);
    const requestedRedirect = sessionStorage.getItem('vv_redirect')
      || urlParams.get('redirect')
      || '/pages/food.html';
    sessionStorage.removeItem('vv_redirect');
    const redirect = (requestedRedirect.startsWith('/') && !requestedRedirect.startsWith('//'))
      ? requestedRedirect : '/pages/food.html';

    let lineProfile = null;
    let liffInitPromise = null;
    function ensureLiffInit() {
      if (!liffInitPromise) {
        liffInitPromise = liff.init({ liffId: LIFF_IDS.login });
      }
      return liffInitPromise;
    }

    function showMsg(text, ok = false) {
      const el = document.getElementById('msgBox');
      el.textContent = text;
      el.className = `mt-3 sm:mt-4 p-2.5 sm:p-3 rounded-xl sm:rounded-2xl text-2xs sm:text-sm text-center font-semibold break-words ${ok ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-300'}`;
      el.classList.remove('hidden');
    }

    function setStatus(t) { document.getElementById('statusText').textContent = t; }

    function renderProfile(p) {
      document.getElementById('subtitle').textContent = p.displayName || 'LINE user';
      if (p.pictureUrl) {
        document.getElementById('avatarPreview').innerHTML = `<img src="${p.pictureUrl}" class="w-full h-full object-cover" alt="" loading="lazy">`;
      }
    }

    function toBE(ceStr) {
      if (!ceStr) return null;
      const p = ceStr.split('-');
      return `${parseInt(p[0]) + 543}-${p[1]}-${p[2]}`;
    }

    document.getElementById('regBirthDate').addEventListener('change', (e) => {
      const hint = document.getElementById('birthDateHint');
      if (e.target.value) {
        hint.textContent = `→ วันเกิด: ${toBE(e.target.value)} (พ.ศ.)`;
        hint.classList.remove('text-white/30');
        hint.classList.add('text-emerald-400/70');
      } else {
        hint.textContent = 'เลือกวันเกิด (จะแสดงเป็น พ.ศ. อัตโนมัติ)';
        hint.classList.add('text-white/30');
        hint.classList.remove('text-emerald-400/70');
      }
    });

    function updateBMIPreview() {
      const w = parseFloat(document.getElementById('regWeight').value);
      const h = parseFloat(document.getElementById('regHeight').value);
      const preview = document.getElementById('bmiPreview');
      if (w > 0 && h > 0) {
        const hm = h / 100;
        const bmi = w / (hm * hm);
        let label = '';
        if (bmi < 18.5) label = 'น้ำหนักน้อยกว่าเกณฑ์';
        else if (bmi < 23) label = 'น้ำหนักปกติ';
        else if (bmi < 25) label = 'น้ำหนักเกินเกณฑ์';
        else if (bmi < 30) label = 'อ้วน';
        else label = 'อ้วนมาก';
        document.getElementById('bmiValue').textContent = bmi.toFixed(1);
        document.getElementById('bmiLabel').textContent = label;
        preview.classList.remove('hidden');
      } else {
        preview.classList.add('hidden');
      }
    }
    document.getElementById('regWeight').addEventListener('input', updateBMIPreview);
    document.getElementById('regHeight').addEventListener('input', updateBMIPreview);

    /* ──────────────────────────────────────────────────────────
       🔑 signInWithLineUid(lineUserId)
       
       Signs in using Firebase Custom Token via Cloud Function.
       After this, auth.currentUser.uid === Firestore doc ID.
       
       The doc ID is either:
       - The existing doc ID from Firestore (backward compatible)
       - Or the lineUserId itself (for newly registered users)
       ────────────────────────────────────────────────────────── */
    async function signInWithLineUid(lineUserId) {
      setStatus('กำลังเข้าสู่ระบบ...');
      
      try {
        // ตรวจสอบว่า Firebase Auth ไม่มี session ค้างอยู่
        if (auth.currentUser) {
          console.log('⚠️ มี session เก่า จะ sign out ก่อน');
          const { signOut } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
          await signOut(auth);
        }

        // Call Cloud Function to generate Custom Token
        const CF_URL = 'https://us-central1-ncds-nrru-model.cloudfunctions.net/generateLineAuthToken';
        const cfRes = await fetch(CF_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lineUid: lineUserId })
        });

        if (!cfRes.ok) {
          const errData = await cfRes.json().catch(() => ({}));
          throw new Error(errData.error?.message || errData.message || `Cloud Function error (HTTP ${cfRes.status})`);
        }

        const { token } = await cfRes.json();
        if (!token) throw new Error('No token returned from Cloud Function');

        // Sign in with the Custom Token
        const cred = await signInWithCustomToken(auth, token);
        const firebaseUid = cred.user.uid;
        console.log('✅ Signed in with Custom Token, UID:', firebaseUid);

        return firebaseUid;
      } catch (err) {
        console.error('❌ signInWithLineUid error:', err);
        throw err;
      }
    }

    /* ──────────────────────────────────────────────────────────
       🎯 finishLogin(firebaseUid, userData, profile)
       
       Common function called after both registration and returning login.
       Saves session, stores lineUid mapping in Firestore, and redirects.
       ────────────────────────────────────────────────────────── */
    function finishLogin(firebaseUid, userData, profile) {
      // Save session to localStorage (for auth.js getSession/requireAuth)
      saveSession({
        uid: firebaseUid,
        displayName: userData.displayName || profile.displayName || 'LINE User',
        avatar: userData.avatar || profile.pictureUrl || '',
        lineUid: profile.userId,
        phone: userData.phone || '',
        birthDate: userData.birthDate || '',
        initialWeight: userData.initialWeight || null,
        initialHeight: userData.initialHeight || null,
      });

      // Redirect to the intended page
      window.location.href = redirect;
    }

    /* ── Search user by LINE userId ────────────────────────── */
    async function findUserByLineId(lineUserId) {
      if (!lineUserId) return null;
      try {
        const s = await getDocs(query(collection(db, 'users'), where('lineUid', '==', lineUserId)));
        if (!s.empty) {
          const f = s.docs[0];
          return { id: f.id, data: f.data() };
        }
      } catch (e) {
        console.warn('⚠️ findUserByLineId failed:', e.message);
      }
      return null;
    }

    function showRegister(profile) {
      document.getElementById('statusView').classList.add('hidden');
      document.getElementById('registerView').classList.remove('hidden');
      document.getElementById('regName').value = profile.displayName || '';
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      document.getElementById('regBirthDate').setAttribute('max', `${y}-${m}-${d}`);
      showMsg('กรุณากรอกข้อมูลเพื่อลงทะเบียน', true);
      requestAnimationFrame(() => {
        const nameVal = document.getElementById('regName').value.trim();
        const target = nameVal ? document.getElementById('regPhone') : document.getElementById('regName');
        target.focus();
      });
    }

    /* ──────────────────────────────────────────────────────────
       🚀 Main flow: continueWithLineProfile
       
       Called after LINE profile is obtained.
       Differences from old code:
       - ❌ No signInAnonymously()
       - ❌ No vv_auth_mode / vv_firestore_uid
       - ✅ Uses signInWithLineUid() → Custom Token → stable UID
       - ✅ firestore.rules sees request.auth.uid → data accessible
       ────────────────────────────────────────────────────────── */
    async function continueWithLineProfile(profile) {
      if (!profile?.userId) { showMsg('ไม่ได้รับข้อมูล LINE Profile'); setStatus('ข้อมูล LINE ไม่ครบ'); return; }
      renderProfile(profile);
      setStatus('กำลังตรวจสอบการลงทะเบียน...');
      try {
        const user = await findUserByLineId(profile.userId);

        if (!user) {
          // ===== NEW USER =====
          // ยังไม่มีข้อมูล ให้แสดงฟอร์มลงทะเบียน
          lineProfile = profile;
          showRegister(profile);
          return;
        }

        // ===== RETURNING USER =====
        // มี user ในระบบแล้ว → sign in with Custom Token → redirect
        setStatus('กำลังเข้าสู่ระบบ...');
        
        try {
          const firebaseUid = await signInWithLineUid(profile.userId);
          
          // Sync เฉพาะ firebaseUid เข้า session ถ้าไม่ตรงกับ doc ID
          const finalUid = firebaseUid;
          
          finishLogin(finalUid, user.data, profile);
        } catch (signInErr) {
          console.error('❌ signInWithLineUid failed:', signInErr);
          
          // Fallback: ถ้า Cloud Function ล้มเหลว (เช่น deploy ครั้งแรกยังไม่มี)
          // ให้ใช้ doc ID โดยตรง แล้ว redirect (user ต้องเปิดหน้า food.html อีกครั้ง)
          // ซึ่งจะพยายาม auth ใหม่อีกครั้ง
          showMsg(`เข้าสู่ระบบไม่สำเร็จ: ${signInErr.message}`, false);
          
          // "Skip" option — ใช้ doc ID ในเครื่อง (ไม่มีการ auth ฝั่ง Firebase)
          // ใช้เฉพาะในกรณี Cloud Function ยังไม่พร้อม
          if (signInErr.message.includes('Failed to fetch') || signInErr.message.includes('NetworkError')) {
            showMsg('Cloud Function ยังไม่พร้อม deploy กรุณา deploy Functions ก่อน', false);
            document.getElementById('statusView').classList.add('hidden');
            document.getElementById('btnLineLogin').classList.remove('hidden');
            document.getElementById('btnLineLogin').disabled = false;
            document.getElementById('btnLineLogin').textContent = 'ลองใหม่';
            return;
          }
          
          throw signInErr;
        }
      } catch (err) {
        showMsg('ตรวจสอบข้อมูลไม่สำเร็จ: ' + err.message);
        setStatus('เกิดข้อผิดพลาด');
        document.getElementById('statusView').classList.add('hidden');
        document.getElementById('btnLineLogin').classList.remove('hidden');
        document.getElementById('btnLineLogin').disabled = false;
        document.getElementById('btnLineLogin').textContent = 'ลองเข้าสู่ระบบอีกครั้ง';
      }
    }

    async function startLineLogin() {
      try {
        if (!window.liff) throw new Error('LINE LIFF SDK ไม่สามารถโหลดได้');
        setStatus('กำลังเชื่อมต่อ LINE...');

        const initPromise = ensureLiffInit();
        const timeoutPromise = new Promise((_, reject) =>
          setTimeout(() => reject(new Error('LINE เชื่อมต่อช้า — กรุณาลองใหม่')), 8000)
        );
        await Promise.race([initPromise, timeoutPromise]);

        if (!liff.isLoggedIn()) {
          if (liff.isInClient()) {
            const urlRedirect = urlParams.get('redirect');
            if (urlRedirect) {
              sessionStorage.setItem('vv_redirect', urlRedirect);
            }
            console.log('📱 LINE login, redirectUri:', APP_BASE_URL);
            liff.login({ redirectUri: APP_BASE_URL });
          } else {
            document.getElementById('statusView').classList.add('hidden');
            document.getElementById('btnLineLogin').classList.remove('hidden');
            setStatus('กรุณากดปุ่มด้านล่าง');
          }
          return;
        }
        const profile = await liff.getProfile();
        await continueWithLineProfile(profile);
      } catch (err) {
        console.error('❌ startLineLogin error:', err);
        document.getElementById('statusView').classList.add('hidden');
        document.getElementById('btnLineLogin').classList.remove('hidden');
        document.getElementById('btnLineLogin').disabled = false;
        document.getElementById('btnLineLogin').textContent = 'ลองใหม่';
        setStatus('เชื่อมต่อ LINE ล้มเหลว');
        showMsg(err.message || 'เข้าสู่ระบบไม่สำเร็จ');
      }
    }

    document.getElementById('btnLineLogin').addEventListener('click', async () => {
      const btn = document.getElementById('btnLineLogin');
      btn.disabled = true;
      btn.textContent = 'กำลังเชื่อมต่อ...';
      try {
        await ensureLiffInit();
        const urlRedirect = urlParams.get('redirect');
        if (urlRedirect) {
          sessionStorage.setItem('vv_redirect', urlRedirect);
        }
        liff.login({ redirectUri: APP_BASE_URL });
      } catch (err) {
        showMsg(err.message);
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบด้วย LINE';
      }
    });

    let isRegistering = false;

    /* ──────────────────────────────────────────────────────────
       📝 Registration Handler (Refactored)
       
       Key change: Doc ID is now the LINE userId directly.
       This means the doc ID is stable across all future logins.
       
       Old flow (broken):
         signInAnonymously → get uid → use uid as doc ID → uid changes next login
       
       New flow:
         lineUserId is the doc ID → always findable → always same
       ────────────────────────────────────────────────────────── */
    document.getElementById('btnRegister').addEventListener('click', async () => {
      if (isRegistering) return;
      if (!lineProfile?.userId) return showMsg('ข้อมูล LINE หาย กรุณาลองใหม่');

      const displayName = document.getElementById('regName').value.trim() || lineProfile.displayName || 'LINE User';
      const phone = document.getElementById('regPhone').value.trim();
      const birthDate = document.getElementById('regBirthDate').value;
      const initialWeight = parseFloat(document.getElementById('regWeight').value) || null;
      const initialHeight = parseFloat(document.getElementById('regHeight').value) || null;
      const email = document.getElementById('regEmail').value.trim();

      if (!displayName) return showMsg('กรุณาระบุชื่อ-นามสกุล');
      if (!/^0[0-9]{9}$/.test(phone)) return showMsg('เบอร์โทรไม่ถูกต้อง (ต้องเป็น 0 ตามด้วยตัวเลข 9 ตัว ไม่มีช่องว่างหรือขีด)');
      if (!birthDate) return showMsg('กรุณาเลือกวันเดือนปีเกิด');

      const todayStr = new Date().toISOString().slice(0, 10);
      if (birthDate > todayStr) return showMsg('วันเดือนปีเกิดต้องไม่เกินวันนี้');
      if (!initialWeight || initialWeight < 20) return showMsg('กรุณาระบุน้ำหนักที่ถูกต้อง');
      if (!initialHeight || initialHeight < 50) return showMsg('กรุณาระบุส่วนสูงที่ถูกต้อง');

      isRegistering = true;
      const btn = document.getElementById('btnRegister');
      btn.disabled = true; btn.textContent = 'กำลังสร้างบัญชี...';

      const lineUserId = lineProfile.userId;
      const now = new Date().toISOString();

      try {
        // ตรวจสอบซ้ำว่ามี user หรือยัง (เผื่อ user กดสร้างซ้ำ)
        const existing = await findUserByLineId(lineUserId);
        if (existing) {
          // มีแล้ว → sign in และ redirect
          showMsg('พบข้อมูลผู้ใช้แล้ว กำลังเข้าสู่ระบบ...', true);
          try {
            const firebaseUid = await signInWithLineUid(lineUserId);
            finishLogin(firebaseUid, existing.data, lineProfile);
          } catch (signInErr) {
            throw new Error('เข้าสู่ระบบหลังลงทะเบียนไม่สำเร็จ: ' + signInErr.message);
          }
          return;
        }

        // ===== สร้าง user ใหม่ =====
        // ใช้ lineUserId เป็น doc ID โดยตรง
        // เพื่อให้หา user เจอเสมอเมื่อ login กลับมา
        const userRef = doc(db, 'users', lineUserId);
        const userData = {
          uid: lineUserId,
          lineUid: lineUserId,
          displayName,
          phone,
          birthDate,
          initialWeight,
          initialHeight,
          email: email || '',
          avatar: lineProfile.pictureUrl || '',
          points: 0,
          wallet: 0,
          calorieGoal: 2000,
          createdAt: now,
          updatedAt: now,
        };

        await runTransaction(db, async (tx) => {
          const snap = await tx.get(userRef);
          if (snap.exists()) {
            // มีเอกสารแล้ว (race condition) — merge ข้อมูล
            tx.set(userRef, { ...userData, createdAt: snap.data().createdAt || now }, { merge: true });
          } else {
            tx.set(userRef, userData);
          }
        });
        console.log('✅ User doc created with ID:', lineUserId);

        // สร้าง bodyStats เริ่มต้น
        try {
          await addDoc(collection(db, 'bodyStats'), {
            uid: lineUserId,
            height: initialHeight,
            weight: initialWeight,
            waist: null,
            hip: null,
            muscle: null,
            bloodfat: null,
            bloodsugar: null,
            bloodpressure: null,
            createdAt: now,
          });
          console.log('✅ Initial bodyStats created');
        } catch (bsErr) {
          console.warn('⚠️ bodyStats init failed (non-critical):', bsErr.message);
        }

        // ===== Sign in with Custom Token =====
        // ใช้ Cloud Function เพื่อขอ token สำหรับ lineUserId
        // (Cloud Function จะหา user ด้วย lineUid และสร้าง token ให้)
        showMsg('กำลังเข้าสู่ระบบ...', true);
        try {
          const firebaseUid = await signInWithLineUid(lineUserId);
          finishLogin(firebaseUid, userData, lineProfile);
        } catch (signInErr) {
          // ถ้า Cloud Function ยังไม่ deploy → fallback: ใช้ session โดยตรง
          console.warn('⚠️ Cloud Function not available, using offline session:', signInErr.message);
          
          // บันทึก session ในเครื่อง (ไม่มี Firebase Auth)
          // user จะสามารถใช้งานได้เฉพาะหน้า login.html ครั้งนี้เท่านั้น
          // ถ้า refresh หน้าอื่นจะเจอปัญหา — แนะนำให้ deploy Functions ก่อน
          saveSession({
            uid: lineUserId,
            displayName,
            avatar: lineProfile.pictureUrl || '',
            lineUid: lineUserId,
            phone,
            birthDate,
            initialWeight,
            initialHeight,
          });
          
          showMsg('⚠️ Cloud Function ยังไม่ deploy — session ในเครื่องเท่านั้น กรุณา deploy Functions', true);
          
          // Redirect ต่อไป (จะพยายาม auth ใหม่จาก food.html)
          setTimeout(() => { window.location.href = redirect; }, 2000);
        }

      } catch (err) {
        console.error('❌ Registration error:', err);
        showMsg('สร้างบัญชีไม่สำเร็จ: ' + err.message);
        btn.disabled = false; btn.textContent = 'สร้างบัญชี';
        isRegistering = false;
      }
    });

    startLineLogin().catch(err => {
      console.error('⚠️ Unhandled error in startLineLogin:', err);
      document.getElementById('statusView').classList.add('hidden');
      document.getElementById('btnLineLogin').classList.remove('hidden');
      document.getElementById('btnLineLogin').disabled = false;
      document.getElementById('btnLineLogin').textContent = 'ลองใหม่';
      setStatus('เกิดข้อผิดพลาด');
      showMsg('เข้าสู่ระบบล้มเหลว กรุณาลองใหม่');
    });
  </script>
</body>
</html>
