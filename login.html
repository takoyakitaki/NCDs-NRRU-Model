<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VitalVibe - LINE Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #0d1117; }
    html, body { height: 100%; height: 100dvh; }
    .card-glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-primary {
      background: linear-gradient(135deg, #06c755, #14b8a6);
      transition: all .2s;
    }
    .btn-primary:active { transform: scale(0.97); opacity: .9; }
    .btn-primary:disabled { opacity: 0.4; pointer-events: none; }
    input:focus, select:focus { outline: none; border-color: #06c755; }
    @keyframes floatUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .float-up { animation: floatUp .5s ease-out forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .8s linear infinite; }
    /* ฟอร์มลงทะเบียนยาว → ให้ scroll ภายในการ์ด */
    .register-scroll { max-height: 70vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .register-scroll::-webkit-scrollbar { display: none; }
    .register-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    /* ซ่อนลูกศรของ date input บน dark bg */
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full opacity-20" style="background:radial-gradient(circle,#06c755,transparent)"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full opacity-20" style="background:radial-gradient(circle,#14b8a6,transparent)"></div>
  </div>

  <div class="w-full max-w-sm float-up">
    <div class="text-center mb-6">
      <div id="avatarPreview" class="w-20 h-20 mx-auto rounded-3xl flex items-center justify-center text-4xl mb-3 shadow-2xl overflow-hidden"
           style="background:linear-gradient(135deg,#06c755,#14b8a6)">VV</div>
      <h1 class="text-3xl font-black text-white tracking-tight">VitalVibe</h1>
      <p id="subtitle" class="text-sm text-emerald-400 font-semibold mt-1">Login with LINE</p>
    </div>

    <div class="card-glass rounded-3xl p-6">

      <!-- สถานะโหลด -->
      <div id="statusView">
        <div class="text-center py-4">
          <div class="w-12 h-12 border-4 border-white/20 border-t-emerald-400 rounded-full spinner mx-auto mb-4"></div>
          <p id="statusText" class="text-white font-bold text-sm">กำลังเชื่อมต่อ LINE...</p>
          <p class="text-white/40 text-xs mt-2">กรุณาเปิดหน้านี้ภายในแอป LINE</p>
        </div>
      </div>

      <!-- ✅ ฟอร์มลงทะเบียน — เพิ่มฟิลด์ใหม่ -->
      <div id="registerView" class="hidden">
        <div class="mb-4">
          <h2 class="text-white font-black text-xl">📝 ลงทะเบียน</h2>
          <p class="text-white/45 text-xs mt-1">กรอกข้อมูลเพื่อเริ่มใช้งาน VitalVibe</p>
        </div>
        <div class="register-scroll space-y-3 pr-1">
          <!-- ชื่อ-นามสกุล -->
          <div>
            <label class="text-xs text-white/45 font-bold">ชื่อ - นามสกุล <span class="text-emerald-400">*</span></label>
            <input id="regName" type="text" placeholder="เช่น สมชาย ใจดี"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-white placeholder-white/40 text-sm transition-colors">
          </div>

          <!-- เบอร์โทรศัพท์ -->
          <div>
            <label class="text-xs text-white/45 font-bold">เบอร์โทรศัพท์ <span class="text-emerald-400">*</span></label>
            <input id="regPhone" type="tel" placeholder="0812345678" maxlength="10"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-white placeholder-white/40 text-sm transition-colors">
          </div>

          <!-- วันเดือนปีเกิด -->
          <div>
            <label class="text-xs text-white/45 font-bold">วันเดือนปีเกิด <span class="text-emerald-400">*</span></label>
            <input id="regBirthDate" type="date"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-white placeholder-white/40 text-sm transition-colors">
            <p id="birthDateHint" class="text-[10px] text-white/30 mt-1">เลือกวันเกิด (จะแสดงเป็น พ.ศ. อัตโนมัติ)</p>
          </div>

          <!-- น้ำหนัก & ส่วนสูง -->
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-white/45 font-bold">น้ำหนัก (kg) <span class="text-emerald-400">*</span></label>
              <input id="regWeight" type="number" placeholder="65" step="0.1" min="20" max="300"
                class="mt-1 w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-white placeholder-white/40 text-sm transition-colors">
            </div>
            <div>
              <label class="text-xs text-white/45 font-bold">ส่วนสูง (cm) <span class="text-emerald-400">*</span></label>
              <input id="regHeight" type="number" placeholder="170" step="0.1" min="50" max="250"
                class="mt-1 w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-white placeholder-white/40 text-sm transition-colors">
            </div>
          </div>

          <!-- อีเมล (optional) -->
          <div>
            <label class="text-xs text-white/45 font-bold">อีเมล (ไม่จำเป็น)</label>
            <input id="regEmail" type="email" placeholder="name@example.com"
              class="mt-1 w-full bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-white placeholder-white/40 text-sm transition-colors">
          </div>
        </div>

        <!-- ✅ แสดง BMI แบบ real-time -->
        <div id="bmiPreview" class="hidden mt-3 p-3 rounded-2xl bg-white/10 text-center">
          <p class="text-white/60 text-xs">BMI ของคุณ</p>
          <p id="bmiValue" class="text-2xl font-black text-emerald-400 mt-1">–</p>
          <p id="bmiLabel" class="text-xs text-white/50 mt-0.5">–</p>
        </div>

        <button id="btnRegister" class="btn-primary w-full mt-4 py-3.5 rounded-2xl text-white font-black text-sm shadow-lg">
          สร้างบัญชี
        </button>
      </div>

      <button id="btnLineLogin" class="hidden btn-primary w-full py-3.5 rounded-2xl text-white font-black text-sm shadow-lg">
        เข้าสู่ระบบด้วย LINE
      </button>

      <div id="msgBox" class="hidden mt-4 p-3 rounded-2xl text-sm text-center font-semibold"></div>
    </div>

    <p class="text-center text-white/30 text-xs mt-6">VitalVibe for LINE Web App</p>
  </div>

  <script type="module">
    // ── URL ตรวจสอบ (เหมือนเวอร์ชันก่อนหน้า) ──
    const CORRECT_LOGIN_URL = 'ncds-nrru.vercel.app/login.html';
    const currentUrl = window.location.origin + window.location.pathname;
    if (currentUrl !== CORRECT_LOGIN_URL && window.location.hostname !== 'localhost') {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || '';
      const correctUrl = redirect
        ? `${CORRECT_LOGIN_URL}?redirect=${encodeURIComponent(redirect)}`
        : CORRECT_LOGIN_URL;
      window.location.replace(correctUrl);
      throw new Error('Redirecting');
    }

    let db, LIFF_IDS;
    try {
      const m = await import('./lib/firebase.js');
      db = m.db; LIFF_IDS = m.LIFF_IDS;
    } catch (e) {
      document.getElementById('statusText').textContent = 'โหลด config ไม่สำเร็จ';
      showMsg('ไม่สามารถโหลดการตั้งค่าได้');
      throw e;
    }

    if (!LIFF_IDS?.login) {
      document.getElementById('statusText').textContent = 'การตั้งค่า LIFF ไม่ถูกต้อง';
      showMsg('LIFF_ID ไม่ถูกต้อง กรุณาตรวจไฟล์ lib/firebase.js');
      throw new Error('LIFF_IDS.login missing');
    }

    const { saveSession } = await import('./lib/auth.js');
    const { collection, doc, getDoc, getDocs, query, setDoc, where } =
      await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');

    const params = new URLSearchParams(window.location.search);
    const requestedRedirect = params.get('redirect') || '/pages/food.html';
    const redirect = (requestedRedirect.startsWith('/') && !requestedRedirect.startsWith('//'))
      ? requestedRedirect : '/pages/food.html';

    let lineProfile = null;

    function showMsg(text, ok = false) {
      const el = document.getElementById('msgBox');
      el.textContent = text;
      el.className = `mt-4 p-3 rounded-2xl text-sm text-center font-semibold ${ok ? 'bg-emerald-500/20 text-emerald-300' : 'bg-red-500/20 text-red-300'}`;
      el.classList.remove('hidden');
    }

    function setStatus(t) { document.getElementById('statusText').textContent = t; }

    function renderProfile(p) {
      document.getElementById('subtitle').textContent = p.displayName || 'LINE user';
      if (p.pictureUrl) {
        document.getElementById('avatarPreview').innerHTML = `<img src="${p.pictureUrl}" class="w-full h-full object-cover" alt="">`;
      }
    }

    // ✅ แปลง ค.ศ. → พ.ศ.
    function toBE(ceStr) {
      if (!ceStr) return null;
      const p = ceStr.split('-');
      return `${parseInt(p[0]) + 543}-${p[1]}-${p[2]}`;
    }

    // ✅ แสดง hint วันที่เป็น พ.ศ. เมื่อเลือก date
    document.getElementById('regBirthDate').addEventListener('change', (e) => {
      const hint = document.getElementById('birthDateHint');
      if (e.target.value) {
        hint.textContent = `→ วันเกิด: ${toBE(e.target.value)} (พ.ศ.)`;
        hint.classList.remove('text-white/30');
        hint.classList.add('text-emerald-400/70');
      } else {
        hint.textContent = 'เลือกวันเกิด (จะแสดงเป็น พ.ศ. อัตโนมัติ)';
        hint.classList.add('text-white/30');
        hint.classList.remove('text-emerald-400/70');
      }
    });

    // ✅ คำนวณ BMI real-time ตอนกรอกน้ำหนัก/ส่วนสูง
    function updateBMIPreview() {
      const w = parseFloat(document.getElementById('regWeight').value);
      const h = parseFloat(document.getElementById('regHeight').value);
      const preview = document.getElementById('bmiPreview');
      if (w > 0 && h > 0) {
        const hm = h / 100;
        const bmi = w / (hm * hm);
        let label = '';
        if (bmi < 18.5) label = 'น้ำหนักน้อยกว่าเกณฑ์';
        else if (bmi < 23) label = 'น้ำหนักปกติ';
        else if (bmi < 25) label = 'น้ำหนักเกินเกณฑ์';
        else if (bmi < 30) label = 'อ้วน';
        else label = 'อ้วนมาก';
        document.getElementById('bmiValue').textContent = bmi.toFixed(1);
        document.getElementById('bmiLabel').textContent = label;
        preview.classList.remove('hidden');
      } else {
        preview.classList.add('hidden');
      }
    }
    document.getElementById('regWeight').addEventListener('input', updateBMIPreview);
    document.getElementById('regHeight').addEventListener('input', updateBMIPreview);

    // ✅ บันทึก session พร้อมข้อมูลใหม่
    function saveLineSession(userId, userData, profile) {
      saveSession({
        uid: userId,
        displayName: userData.displayName || profile.displayName || 'LINE User',
        avatar: userData.avatar || profile.pictureUrl || '',
        lineUid: profile.userId,
        phone: userData.phone || '',
        birthDate: userData.birthDate || '',
        initialWeight: userData.initialWeight || null,
        initialHeight: userData.initialHeight || null,
      });
    }

    async function findUserByLineId(lineUserId) {
      if (!lineUserId) return null;
      try {
        const d = await getDoc(doc(db, 'users', lineUserId));
        if (d.exists()) return { id: d.id, data: d.data() };
      } catch (e) { console.warn('⚠️ doc ID lookup failed:', e.message); }
      try {
        const s = await getDocs(query(collection(db, 'users'), where('lineUid', '==', lineUserId)));
        if (!s.empty) { const f = s.docs[0]; return { id: f.id, data: f.data() }; }
      } catch (e) { console.warn('⚠️ field lookup failed:', e.message); }
      return null;
    }

    function showRegister(profile) {
      document.getElementById('statusView').classList.add('hidden');
      document.getElementById('registerView').classList.remove('hidden');
      document.getElementById('regName').value = profile.displayName || '';
      // ตั้ง max date เป็นวันนี้
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      document.getElementById('regBirthDate').setAttribute('max', `${y}-${m}-${d}`);
      showMsg('กรุณากรอกข้อมูลเพื่อลงทะเบียน', true);
    }

    async function continueWithLineProfile(profile) {
      if (!profile?.userId) { showMsg('ไม่ได้รับข้อมูล LINE Profile'); setStatus('ข้อมูล LINE ไม่ครบ'); return; }
      renderProfile(profile);
      setStatus('กำลังตรวจสอบการลงทะเบียน...');
      try {
        const user = await findUserByLineId(profile.userId);
        if (!user) { lineProfile = profile; showRegister(profile); return; }
        saveLineSession(user.id, user.data, profile);
        window.location.href = redirect;
      } catch (err) { showMsg('ตรวจสอบข้อมูลไม่สำเร็จ: ' + err.message); setStatus('เกิดข้อผิดพลาด'); }
    }

    async function startLineLogin() {
      try {
        if (!window.liff) throw new Error('LINE LIFF SDK ไม่สามารถโหลดได้');
        setStatus('กำลังเชื่อมต่อ LINE...');
        await liff.init({ liffId: LIFF_IDS.login });
        if (!liff.isLoggedIn()) {
          if (liff.isInClient()) { liff.login({ redirectUri: window.location.href }); }
          else { document.getElementById('statusView').classList.add('hidden'); document.getElementById('btnLineLogin').classList.remove('hidden'); setStatus('กรุณากดปุ่มด้านล่าง'); }
          return;
        }
        const profile = await liff.getProfile();
        await continueWithLineProfile(profile);
      } catch (err) {
        document.getElementById('btnLineLogin').classList.remove('hidden');
        setStatus('ไม่สามารถเชื่อมต่อ LINE ได้');
        showMsg(err.message || 'เข้าสู่ระบบไม่สำเร็จ');
      }
    }

    document.getElementById('btnLineLogin').addEventListener('click', async () => {
      const btn = document.getElementById('btnLineLogin');
      btn.disabled = true; btn.textContent = 'กำลังเชื่อมต่อ...';
      try { await liff.init({ liffId: LIFF_IDS.login }); liff.login({ redirectUri: window.location.href }); }
      catch (err) { showMsg(err.message); btn.disabled = false; btn.textContent = 'เข้าสู่ระบบด้วย LINE'; }
    });

    // ✅ ปุ่มสร้างบัญชี — validate ฟิลด์ใหม่ + บันทึก
    document.getElementById('btnRegister').addEventListener('click', async () => {
      if (!lineProfile?.userId) return showMsg('ข้อมูล LINE หาย กรุณาลองใหม่');

      const displayName = document.getElementById('regName').value.trim() || lineProfile.displayName || 'LINE User';
      const phone = document.getElementById('regPhone').value.trim();
      const birthDate = document.getElementById('regBirthDate').value; // เก็บเป็น ค.ศ.
      const initialWeight = parseFloat(document.getElementById('regWeight').value) || null;
      const initialHeight = parseFloat(document.getElementById('regHeight').value) || null;
      const email = document.getElementById('regEmail').value.trim();

      // ✅ validate ฟิลด์ที่จำเป็น
      if (!displayName) return showMsg('กรุณาระบุชื่อ-นามสกุล');
      if (!/^0[0-9]{9}$/.test(phone)) return showMsg('เบอร์โทรไม่ถูกต้อง (ต้องเป็น 0 ตามด้วยตัวเลข 9 ตัว)');
      if (!birthDate) return showMsg('กรุณาเลือกวันเดือนปีเกิด');
      if (!initialWeight || initialWeight < 20) return showMsg('กรุณาระบุน้ำหนักที่ถูกต้อง');
      if (!initialHeight || initialHeight < 50) return showMsg('กรุณาระบุส่วนสูงที่ถูกต้อง');

      const btn = document.getElementById('btnRegister');
      btn.disabled = true; btn.textContent = 'กำลังสร้างบัญชี...';

      const userId = lineProfile.userId;
      const userRef = doc(db, 'users', userId);
      const now = new Date().toISOString();

      try {
        await setDoc(userRef, {
          uid: userId,
          lineUid: userId,
          displayName,
          phone,
          birthDate,            // เก็บเป็น ค.ศ. YYYY-MM-DD
          initialWeight,
          initialHeight,
          email: email || '',
          avatar: lineProfile.pictureUrl || '',
          points: 0,
          wallet: 0,
          calorieGoal: 2000,
          createdAt: now,
          updatedAt: now,
        }, { merge: true });

        saveLineSession(userId, { displayName, phone, birthDate, initialWeight, initialHeight, email, avatar: lineProfile.pictureUrl || '' }, lineProfile);
        window.location.href = redirect;
      } catch (err) {
        showMsg('สร้างบัญชีไม่สำเร็จ: ' + err.message);
        btn.disabled = false; btn.textContent = 'สร้างบัญชี';
      }
    });

    startLineLogin();
  </script>
</body>
</html>
